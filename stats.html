<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>统计 · 极简记账本 V1.12.1</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FF8C42'/><text y='.9em' font-size='90' text-anchor='middle' fill='white'>💰</text></svg>">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --text: #2c2c2c;
      --text-light: #666666;
      --accent: #FF8C42;
      --accent-hover: #e67830;
      --accent-active: #cc6a28;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --radius: 12px;
      --card-bg: #fafafa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial,
        sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .page {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ---------- 标题 ---------- */
    .title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.05em;
    }

    /* ---------- 月份导航 ---------- */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .month-nav-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .month-nav-btn:hover {
      background: #d0d0d0;
    }

    .month-nav-btn:active {
      transform: scale(0.92);
    }

    .month-nav-btn:disabled {
      background: #f2f2f2;
      color: #ccc;
      cursor: default;
      pointer-events: none;
    }

    .month-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      min-width: 110px;
      text-align: center;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.15s ease;
    }

    .month-label:hover {
      background: #f0f0f0;
    }

    /* ---------- 统计卡片 ---------- */
    .stats-cards {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .stat-card {
      flex: 1;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 12px;
      text-align: center;
    }

    .stat-card-label {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .stat-card-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-card-value.accent {
      color: var(--accent);
    }

    /* ---------- 图表区 ---------- */
    .chart-container {
      width: 100%;
      height: 220px;
      position: relative;
    }

    .chart-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c0c0c0;
      font-size: 1rem;
      pointer-events: none;
      z-index: 1;
    }

    .chart-empty.hidden {
      display: none;
    }

    /* ---------- 每日明细 ---------- */
    .daily-detail-section {
      width: 100%;
    }

    .daily-detail-summary {
      font-size: 0.9rem;
      color: var(--text-light);
      cursor: pointer;
      padding: 6px 0;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .daily-detail-summary:hover {
      color: var(--accent);
    }

    .daily-detail-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .daily-detail-list.hidden {
      display: none;
    }

    .daily-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .daily-item:hover {
      background: #f0f0f0;
    }

    .daily-item:active {
      transform: scale(0.98);
      background: #e8e8e8;
    }

    .daily-item-date {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 500;
    }

    .daily-item-amount {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: var(--accent);
      font-weight: 600;
    }

    .daily-item-amount.zero {
      color: #c0c0c0;
    }

    .daily-item-arrow {
      font-size: 0.7rem;
      color: #c0c0c0;
    }

    /* ---------- 日明细浮层 ---------- */
    .day-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.18s ease;
    }

    .day-detail-overlay.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .day-detail-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 400px;
      max-width: 92vw;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .day-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .day-detail-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .day-detail-close {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .day-detail-close:hover {
      background: #d5d5d5;
    }

    .day-detail-add-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      flex-shrink: 0;
      margin-right: 8px;
    }

    .day-detail-add-btn:hover {
      background: var(--accent-hover);
    }

    .day-detail-add-btn:active {
      transform: scale(0.9);
    }

    .day-detail-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .day-detail-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .day-record-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #fafafa;
      border-radius: 8px;
      font-size: 0.85rem;
      min-height: 40px;
    }

    .day-record-left {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .day-record-amount {
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .day-record-note {
      color: var(--text-light);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .day-record-time {
      color: #b0b0b0;
      font-size: 0.75rem;
      white-space: nowrap;
      margin-left: 8px;
    }

    .day-record-actions {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-left: 4px;
      flex-shrink: 0;
    }

    .day-record-action-btn {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: transparent;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      color: #999;
    }

    .day-record-action-btn:hover {
      background: #e8e8e8;
      color: #555;
    }

    .day-record-action-btn:active {
      transform: scale(0.88);
      background: #ddd;
    }

    .day-record-action-btn.delete-btn:hover {
      background: #fee;
      color: #d44;
    }

    /* ---------- 编辑态 ---------- */
    .day-record-edit-row {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .day-record-edit-date-label {
      font-size: 0.78rem;
      color: var(--text-light);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .day-record-edit-input {
      border: 1.5px solid #d5d5d5;
      border-radius: 5px;
      padding: 2px 4px;
      font-size: 0.78rem;
      outline: none;
      width: 52px;
      text-align: center;
      transition: border-color 0.15s ease;
      -webkit-appearance: none;
    }

    .day-record-edit-input:focus {
      border-color: var(--accent);
    }

    .day-record-edit-input.time-input {
      width: 58px;
    }

    .day-record-edit-input.note-input {
      flex: 1;
      min-width: 40px;
      text-align: left;
    }

    .day-record-edit-save {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .day-record-edit-save:hover {
      background: var(--accent-hover);
    }

    .day-record-edit-save:active {
      transform: scale(0.9);
    }

    .day-record-edit-cancel {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .day-record-edit-cancel:hover {
      background: #d5d5d5;
    }

    /* ---------- 月份面板 ---------- */
    .month-panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.18s ease;
    }

    .month-panel-overlay.hidden {
      display: none;
    }

    .month-panel-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px;
      width: 280px;
      max-width: 90vw;
      max-height: 60vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .month-panel-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      text-align: center;
    }

    .month-panel-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .month-panel-item {
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      text-align: center;
      transition: background 0.12s ease;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    .month-panel-item:hover {
      background: #f0f0f0;
    }

    .month-panel-item.active {
      background: #fff3eb;
      color: var(--accent);
      font-weight: 600;
    }

    /* ---------- 底部导航栏 ---------- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      height: 56px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 90;
      box-shadow: 0 -1px 6px rgba(0, 0, 0, 0.04);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      background: none;
      border: none;
      color: #b0b0b0;
      font-size: 0.7rem;
      padding: 4px 16px;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }

    .nav-item .nav-icon {
      font-size: 1.35rem;
      line-height: 1;
    }

    .nav-item.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* ========== 移动端优化 ========== */
    @media (max-width: 480px) {
      .page {
        padding: 28px 18px 20px;
        gap: 18px;
      }

      .stat-card-value {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 360px) {
      .stat-card {
        padding: 12px 8px;
      }

      .stat-card-value {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

  <script>
    // ========== Supabase 初始化 ==========
    (function () {
      var SUPABASE_URL = 'https://zmryiekgosgjipnsyayj.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptcnlpZWtnb3NnamlwbnN5YXlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjcyNzQsImV4cCI6MjA5MzkwMzI3NH0.HAnHiz5x1EzwPpVyS8Df270UKvHjkW7LwG5UJiBOEHo';
      // 修复：优先使用已存在的 supabase 实例，避免重复创建
      var supabase = null;
      if (window.__supabase) {
        supabase = window.__supabase;
      } else if (window.supabase) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        window.__supabase = supabase;
      }

      // 修复：currentUser 初始为 null，必须通过 checkSession() 获取
      var currentUser = null;

      var HISTORY_KEY = "minimal_ledger_history";

      // ---------- DOM ----------
      var monthLabelEl = document.getElementById("monthLabel");
      var prevMonthBtn = document.getElementById("prevMonthBtn");
      var nextMonthBtn = document.getElementById("nextMonthBtn");
      var monthTotalEl = document.getElementById("monthTotal");
      var spendingDaysEl = document.getElementById("spendingDays");
      var avgDailyEl = document.getElementById("avgDaily");
      var chartContainer = document.getElementById("chartContainer");
      var trendChartCanvas = document.getElementById("trendChart");
      var chartEmpty = document.getElementById("chartEmpty");
      var dailyDetailSummary = document.getElementById("dailyDetailSummary");
      var dailyDetailList = document.getElementById("dailyDetailList");
      var dayDetailOverlay = document.getElementById("dayDetailOverlay");
      var dayDetailTitle = document.getElementById("dayDetailTitle");
      var dayDetailListEl = document.getElementById("dayDetailListEl");
      var dayDetailCloseBtn = document.getElementById("dayDetailCloseBtn");
      var dayDetailAddBtn = document.getElementById("dayDetailAddBtn");
      var monthPanelOverlay = document.getElementById("monthPanelOverlay");
      var monthPanelList = document.getElementById("monthPanelList");

      var currentYear = null;
      var currentMonth = null;
      var currentDayDetailDate = null;
      var isAddingNewRecord = false;
      var dailyDetailExpanded = false;
      var trendChart = null;

      // ========== 数据加载层 ==========

      // ---------- loadHistory(): 统一入口，对上层透明 ----------
      async function loadHistory() {
        // 修复：必须先获取当前用户状态
        if (!currentUser && supabase) {
          try {
            var { data: sessionData } = await supabase.auth.getSession();
            if (sessionData && sessionData.session && sessionData.session.user) {
              currentUser = sessionData.session.user;
              window.__currentUser = currentUser;
            }
          } catch (e) {
            console.error("[统计] 获取 session 失败:", e.message);
          }
        }

        // 已登录 → 只读云端数据，完全不碰本地数据
        if (currentUser && supabase) {
          _cachedHistory = null;
          var cloudRecords = [];
          try {
            var { data, error } = await supabase
              .from('records')
              .select('id, amount, note, date, time')
              .eq('user_id', currentUser.id)
              .order('created_at', { ascending: true });
            console.log('[统计] Supabase 查询用户:', currentUser.id, '结果:', data ? data.length : 0, '条');

            if (error) throw error;

            if (data && data.length > 0) {
              cloudRecords = data.map(function (r) {
                return {
                  _dbId: r.id,
                  amount: parseFloat(r.amount),
                  note: r.note || '未备注',
                  date: r.date,
                  time: r.time || '--:--'
                };
              });
            }
          } catch (err) {
            console.error("[统计] Supabase 读取失败:", err.message);
          }

          // ===== 关键修改：合并本地数据，解决读副本延迟 =====
          var localRecords = loadFromLocalStorage();
          var cloudDbIds = {};
          for (var i = 0; i < cloudRecords.length; i++) {
            if (cloudRecords[i]._dbId) cloudDbIds[cloudRecords[i]._dbId] = true;
          }
          var merged = cloudRecords.slice();
          for (var i = 0; i < localRecords.length; i++) {
            var local = localRecords[i];
            // 本地有_dbId但云端没返回的（读副本滞后），或者没有_dbId的（未同步），合并进来
            if (local._dbId && !cloudDbIds[local._dbId]) {
              merged.push(local);
            } else if (!local._dbId) {
              merged.push(local);
            }
          }
          // 按日期+时间排序
          merged.sort(function (a, b) {
            return (a.date + ' ' + a.time).localeCompare(b.date + ' ' + b.time);
          });
          return merged;
        }

        // 未登录 → 才读本地数据
        return loadFromLocalStorage();
      }

      function loadFromLocalStorage() {
        var stored = localStorage.getItem(HISTORY_KEY);
        if (!stored) return [];
        try {
          var parsed = JSON.parse(stored);
          if (!Array.isArray(parsed)) return [];
          var lastDate = localStorage.getItem("minimal_ledger_last_date") || getDateString();
          return parsed.map(function (v) {
            if (typeof v === "number") {
              return { amount: v, note: "未备注", time: "--:--", date: lastDate };
            }
            if (v && typeof v.amount === "number") {
              if (!v.date) { v.date = lastDate; }
              if (!v.note) { v.note = "未备注"; }
              if (!v.time) { v.time = "--:--"; }
              return v;
            }
            return null;
          }).filter(function (v) { return v !== null; });
        } catch (e) {
          return [];
        }
      }

      // ---------- saveHistory(): 保存到 localStorage ----------
      function saveHistory(history) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      }

      // ========== 同步到 Supabase（编辑/删除/新增时调用）==========

      async function saveToSupabase(record) {
        if (!currentUser || !supabase) return null;
        try {
          var { data, error } = await supabase
            .from('records')
            .insert([{
              user_id: currentUser.id,
              amount: record.amount,
              note: record.note,
              date: record.date,
              time: record.time
            }])
            .select('id')
            .single();
          if (error) throw error;
          return data ? data.id : null;
        } catch (err) {
          console.error("[统计] Supabase 保存失败:", err.message);
          return null;
        }
      }

      async function updateRecordInSupabase(dbId, updatedData) {
        if (!currentUser || !supabase || !dbId) return;
        try {
          await supabase
            .from('records')
            .update({
              amount: updatedData.amount,
              note: updatedData.note,
              date: updatedData.date,
              time: updatedData.time
            })
            .eq('id', dbId);
        } catch (err) {
          console.error("[统计] Supabase 更新失败:", err.message);
        }
      }

      async function deleteRecordFromSupabase(dbId) {
        if (!currentUser || !supabase || !dbId) return;
        try {
          await supabase
            .from('records')
            .delete()
            .eq('id', dbId);
        } catch (err) {
          console.error("[统计] Supabase 删除失败:", err.message);
        }
      }

      // ========== 工具函数 ==========

      function getDateString() {
        var now = new Date();
        var y = now.getFullYear();
        var m = (now.getMonth() + 1).toString().padStart(2, "0");
        var d = now.getDate().toString().padStart(2, "0");
        return y + "-" + m + "-" + d;
      }

      function formatAmount(value) {
        return parseFloat(value.toFixed(2));
      }

      // ========== 数据聚合 ==========

      // 当月总支出
      function getMonthTotal(year, month) {
        var history = loadHistorySync();
        var total = 0;
        for (var i = 0; i < history.length; i++) {
          var parts = history[i].date.split("-");
          if (parseInt(parts[0], 10) === year && parseInt(parts[1], 10) === month) {
            total += history[i].amount;
          }
        }
        return parseFloat(total.toFixed(2));
      }

      // 按天聚合当月消费
      function aggregateByDay(year, month) {
        var history = loadHistorySync();
        var daysInMonth = new Date(year, month, 0).getDate();
        var dailyMap = {};
        for (var d = 1; d <= daysInMonth; d++) {
          var dStr = year + "-" + month.toString().padStart(2, "0") + "-" + d.toString().padStart(2, "0");
          dailyMap[dStr] = 0;
        }
        for (var i = 0; i < history.length; i++) {
          var date = history[i].date;
          if (dailyMap.hasOwnProperty(date)) {
            dailyMap[date] += history[i].amount;
          }
        }
        var result = [];
        var keys = Object.keys(dailyMap).sort();
        for (var j = 0; j < keys.length; j++) {
          result.push({ date: keys[j], amount: parseFloat(dailyMap[keys[j]].toFixed(2)) });
        }
        return result;
      }

      // 获取存在的月份
      function getAvailableMonths() {
        var history = loadHistorySync();
        var monthSet = {};
        for (var i = 0; i < history.length; i++) {
          var parts = history[i].date.split("-");
          if (parts.length >= 2) {
            monthSet[parts[0] + "-" + parts[1]] = true;
          }
        }
        var months = Object.keys(monthSet).sort();
        return months;
      }

      // 同步读取缓存（用于聚合时避免多次异步调用）
      var _cachedHistory = null;
      function loadHistorySync() {
        return _cachedHistory || [];
      }

      async function refreshHistoryCache() {
        _cachedHistory = await loadHistory();
      }

      // ========== 月份导航 ==========

      function canGoToPrev() {
        var available = getAvailableMonths();
        if (available.length === 0) return false;
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        var idx = available.indexOf(currentYM);
        return idx > 0;
      }

      function canGoToNext() {
        var available = getAvailableMonths();
        if (available.length === 0) return false;
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        var idx = available.indexOf(currentYM);
        return idx >= 0 && idx < available.length - 1;
      }

      function goToPrevMonth() {
        var available = getAvailableMonths();
        if (available.length === 0) return;
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        var idx = available.indexOf(currentYM);
        if (idx > 0) {
          var parts = available[idx - 1].split("-");
          currentYear = parseInt(parts[0], 10);
          currentMonth = parseInt(parts[1], 10);
          collapseDailyDetail();
          renderAll();
        }
      }

      function goToNextMonth() {
        var available = getAvailableMonths();
        if (available.length === 0) return;
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        var idx = available.indexOf(currentYM);
        if (idx >= 0 && idx < available.length - 1) {
          var parts = available[idx + 1].split("-");
          currentYear = parseInt(parts[0], 10);
          currentMonth = parseInt(parts[1], 10);
          collapseDailyDetail();
          renderAll();
        }
      }

        for (var i = 0; i < daily.length; i++) {

        }
        spendingDaysEl.textContent = days + "天";
        avgDailyEl.textContent = days > 0 ? parseFloat((monthTotalVal / days).toFixed(2)) + "元" : "0元";
      }

      }

      function renderDailyDetail() {

          if (daily[i].amount > 0) spendingDays++;
        }

          return;
        }
        if (dailyDetailExpanded) {
          dailyDetailSummary.textContent = "▲ 收起明细";
          dailyDetailSummary.style.cursor = "pointer";
          dailyDetailList.classList.remove("hidden");
          for (var i = 0; i < daily.length; i++) {
            if (daily[i].amount === 0) continue;
            var itemDiv = document.createElement("div");
            itemDiv.className = "daily-item";
            var dateParts = daily[i].date.split("-");

            var dateSpan = document.createElement("span");
            dateSpan.className = "daily-item-date";
            dateSpan.textContent = displayDate;
            var amountDiv = document.createElement("div");
            var amountSpan = document.createElement("span");
            var arrowSpan = document.createElement("span");
            arrowSpan.className = "daily-item-arrow";
            arrowSpan.textContent = "❯";
            if (daily[i].amount > 0) {
              amountDiv.className = "daily-item-amount";
              amountSpan.textContent = formatAmount(daily[i].amount) + "元";
            } else {
              amountDiv.className = "daily-item-amount zero";
            }
            amountDiv.appendChild(amountSpan);
            amountDiv.appendChild(arrowSpan);
            itemDiv.appendChild(dateSpan);
            itemDiv.appendChild(amountDiv);
            (function (dateStr, dispDate) {
              itemDiv.addEventListener("click", function () {
                openDayDetail(dateStr, dispDate);
              });
            })(daily[i].date, displayDate);
            dailyDetailList.appendChild(itemDiv);
          }
        } else {
          dailyDetailSummary.textContent = "▼ 查看每日明细（已消费 " + spendingDays + " 天）";

      function toggleDailyDetail() {
        var daily = aggregateByDay(currentYear, currentMonth);
        var spendingDays = 0;
        for (var i = 0; i < daily.length; i++) {
          if (daily[i].amount > 0) spendingDays++;
        }
        if (spendingDays === 0) return;
        dailyDetailExpanded = !dailyDetailExpanded;
        renderDailyDetail();
      }

      function collapseDailyDetail() {
        dailyDetailExpanded = false;
        renderDailyDetail();
      }

      }

      async function renderDayDetailContent() {
        var dateStr = currentDayDetailDate;
        if (!dateStr) return;

        dayDetailTitle.textContent = displayDate + " 明细";
        var history = loadHistorySync();  // ← 使用缓存，避免重复加载
        var records = [];
        var recordIndices = [];
        for (var i = 0; i < history.length; i++) {
          if (history[i].date === dateStr) {
            records.push({ record: history[i], index: i });
          }
        }
        records.sort(function (a, b) {
          return a.record.time.localeCompare(b.record.time);
        });
        var sortedRecords = records.map(function (v) { return v.record; });
        var sortedIndices = records.map(function (v) { return v.index; });
        dayDetailListEl.innerHTML = "";
        var reversed = sortedRecords.slice().reverse();
        var reversedIndices = sortedIndices.slice().reverse();

        for (var j = 0; j < reversed.length; j++) {

          noteSpan.className = "day-record-note";
          noteSpan.textContent = record.note || "未备注";
          leftDiv.appendChild(amountSpan);
          leftDiv.appendChild(noteSpan);
          var timeSpan = document.createElement("span");
          timeSpan.className = "day-record-time";
          timeSpan.textContent = record.time || "--:--";
          var actionsDiv = document.createElement("div");
          actionsDiv.className = "day-record-actions";
          var editBtn = document.createElement("button");
          editBtn.className = "day-record-action-btn";
          editBtn.textContent = "✏️";
          editBtn.title = "编辑";
          editBtn.addEventListener("click", function (idx, div) {

          }(originalIndex));

          actionsDiv.appendChild(deleteBtn);
          itemDiv.appendChild(leftDiv);
          itemDiv.appendChild(actionsDiv);
          itemDiv.appendChild(timeSpan);
          dayDetailListEl.appendChild(itemDiv);
        }
      }

      async function refreshAll() {
        _cachedHistory = null;
        await refreshHistoryCache();
        updateStatsCards();
        updateChart();
        renderDailyDetail();
        await renderDayDetailContent();
        var history = loadHistorySync();
        var hasRecords = false;
        for (var i = 0; i < history.length; i++) {
          if (history[i].date === currentDayDetailDate) { hasRecords = true; break; }
        }
        if (!hasRecords) { closeDayDetail(); }
      }

      // ========== 删除记录 ==========

      async function deleteRecord(originalIndex) {
        if (!confirm("确定删除这条记录吗？")) return;

        // 确保已登录
        if (!currentUser || !supabase) {
          alert("请先登录");
          return;
        }

        var history = await loadHistory();
        if (originalIndex < 0 || originalIndex >= history.length) return;
        var removed = history.splice(originalIndex, 1)[0];

        // 同步删除 Supabase
        if (removed._dbId) {
          await deleteRecordFromSupabase(removed._dbId);
        }

        // 强制清空缓存，下次从云端重新加载
        _cachedHistory = null;

        // 通知其他页面刷新
        localStorage.setItem('auth_state_changed', Date.now());

        await refreshAll();
      }

        itemDiv.setAttribute("data-editing", "true");
        itemDiv.setAttribute("data-editing-index", originalIndex);
        itemDiv.innerHTML = "";

        var timeInput = document.createElement("input");
        timeInput.type = "time";
        timeInput.className = "day-record-edit-input time-input";
        var timeVal = record.time || "";
        if (timeVal && /^\d{2}:\d{2}(:\d{2})?$/.test(timeVal)) {
          timeInput.value = timeVal.substring(0, 5);
        } else {
          timeInput.value = "";

        amountEditInput.addEventListener("input", function () {
          var val = this.value.replace(/[^0-9.]/g, "");
          var dotIdx = val.indexOf(".");
          if (dotIdx !== -1) {
            val = val.substring(0, dotIdx + 1) + val.substring(dotIdx + 1).replace(/\./g, "");
            if (val.substring(dotIdx + 1).length > 2) { val = val.substring(0, dotIdx + 3); }
          }
          this.value = val;
        });
        var noteEditInput = document.createElement("input");

          if (e.key === "Enter") { e.preventDefault(); saveEdit(originalIndex, timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
        noteEditInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveEdit(originalIndex, timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
      }

      async function saveEdit(originalIndex, newTimeStr, newAmountStr, newNoteStr) {

          alert("请选择时间");
          return;
        }
        var newAmount = parseFloat(newAmountStr);
        if (isNaN(newAmount) || newAmount <= 0) return;
        var history = await loadHistory();
        if (originalIndex < 0 || originalIndex >= history.length) return;
        var formattedTime = newTimeStr.length === 5 ? newTimeStr + ":00" : newTimeStr;
        var oldRecord = history[originalIndex];
        history[originalIndex].amount = newAmount;
        history[originalIndex].note = newNoteStr !== "" ? newNoteStr : "未备注";
        history[originalIndex].time = formattedTime;
        // 同步更新 Supabase
        // 同步更新 Supabase
        if (currentUser && oldRecord._dbId) {
          await updateRecordInSupabase(oldRecord._dbId, {
            amount: history[originalIndex].amount,
            note: history[originalIndex].note,
            date: history[originalIndex].date,
            time: history[originalIndex].time
          });
        }

        // 强制清空缓存
        _cachedHistory = null;

        // 通知其他页面刷新
        localStorage.setItem('auth_state_changed', Date.now());

        await refreshAll();
      }

        setTimeout(function () { amountEditInput.focus(); }, 50);
        timeInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveNewRecord(timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
        amountEditInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveNewRecord(timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
        noteEditInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveNewRecord(timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
        dayDetailListEl.scrollTop = dayDetailListEl.scrollHeight;
      }

      async function saveNewRecord(newTimeStr, newAmountStr, newNoteStr) {
        if (newTimeStr === "") { alert("请选择时间"); return; }
        var newAmount = parseFloat(newAmountStr);
        if (isNaN(newAmount) || newAmount <= 0) return;
        var history = await loadHistory();
        var formattedTime = newTimeStr.length === 5 ? newTimeStr + ":00" : newTimeStr;
        var newRecord = {
          amount: newAmount,
          note: newNoteStr !== "" ? newNoteStr : "未备注",
          time: formattedTime,
          date: currentDayDetailDate
        };
        history.push(newRecord);
        // 同步到 Supabase
        if (currentUser) {
          var dbId = await saveToSupabase(newRecord);
          if (dbId) { newRecord._dbId = dbId; }
        }

        // 强制清空缓存
        _cachedHistory = null;

        // 通知其他页面刷新
        localStorage.setItem('auth_state_changed', Date.now());

        isAddingNewRecord = false;
        await refreshAll();
      }

      // ========== 关闭浮层 ==========

      function closeDayDetail() {
        dayDetailOverlay.classList.add("hidden");
        currentDayDetailDate = null;
        isAddingNewRecord = false;
      }

      // ========== 月份面板 ==========

      function openMonthPanel() {
        var available = getAvailableMonths();
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        monthPanelList.innerHTML = "";
        if (available.length === 0) {
          var emptyDiv = document.createElement("div");
          emptyDiv.className = "month-panel-item";
          emptyDiv.textContent = "暂无记录";
          emptyDiv.style.color = "#b0b0b0";
          emptyDiv.style.cursor = "default";
          monthPanelList.appendChild(emptyDiv);
        } else {
          for (var i = 0; i < available.length; i++) {
            var ym = available[i];
            var parts = ym.split("-");
            var y = parseInt(parts[0], 10);
            var m = parseInt(parts[1], 10);
            var label = y + "年" + m + "月";
            var itemDiv = document.createElement("div");
            itemDiv.className = "month-panel-item";
            if (ym === currentYM) { itemDiv.classList.add("active"); }
            itemDiv.textContent = label;
            (function (year, month) {
              itemDiv.addEventListener("click", function () { selectMonth(year, month); });
            })(y, m);
            monthPanelList.appendChild(itemDiv);
          }
        }
        monthPanelOverlay.classList.remove("hidden");
      }

      function closeMonthPanel() {
        monthPanelOverlay.classList.add("hidden");
      }

      function selectMonth(year, month) {
        currentYear = year;
        currentMonth = month;
        collapseDailyDetail();
        renderAll();
        closeMonthPanel();
      }

      // ========== 渲染全部 ==========

      async function renderAll(forceRefresh) {
        if (forceRefresh !== false) {
          await refreshHistoryCache();
        }
        updateMonthLabel();
        updateStatsCards();
        updateChart();
        renderDailyDetail();
        var monthTotalVal = getMonthTotal(currentYear, currentMonth);
        if (monthTotalVal > 0) {
          chartEmpty.classList.add("hidden");
        } else {
          chartEmpty.classList.remove("hidden");
        }
      }

      // ========== 初始化 ==========

      async function init() {
        // 修复：强制检查登录状态（不依赖 window.__currentUser）
        if (supabase) {
          try {
            var { data: sessionData } = await supabase.auth.getSession();
            if (sessionData && sessionData.session && sessionData.session.user) {
              currentUser = sessionData.session.user;
              window.__currentUser = currentUser;
              console.log("[统计] 已登录用户:", currentUser.email);
            } else {
              currentUser = null;
              window.__currentUser = null;
              console.log("[统计] 未登录，使用本地数据");
            }
          } catch (e) {
            console.error("[统计] 获取 session 失败:", e.message);
            currentUser = null;
            window.__currentUser = null;
          }
        }

        await refreshHistoryCache();
        var today = new Date();
        currentYear = today.getFullYear();
        currentMonth = today.getMonth() + 1;
        await renderAll(true);
      }

      // ========== 事件绑定 ==========

      prevMonthBtn.addEventListener("click", goToPrevMonth);
      nextMonthBtn.addEventListener("click", goToNextMonth);
      monthLabelEl.addEventListener("click", openMonthPanel);
      monthPanelOverlay.addEventListener("click", function (e) {
        if (e.target === monthPanelOverlay) { closeMonthPanel(); }
      });
      dailyDetailSummary.addEventListener("click", toggleDailyDetail);
      dayDetailCloseBtn.addEventListener("click", closeDayDetail);
      dayDetailOverlay.addEventListener("click", function (e) {
        if (e.target === dayDetailOverlay) { closeDayDetail(); }
      });
      dayDetailAddBtn.addEventListener("click", function () {
        if (!currentDayDetailDate) return;
        startAddRecord();
      });

      // ========== 启动 ==========

      init();

      // 从其他页面返回时强制刷新（解决跳转后数据不同步）
      window.addEventListener('pageshow', function () {
        console.log('[统计] pageshow 触发');

        // 第一次刷新（100ms，快速响应）
        setTimeout(function () {
          _cachedHistory = null;
          refreshHistoryCache().then(function () {
            console.log('[统计] 第一次刷新，记录数:', _cachedHistory ? _cachedHistory.length : 0);
            renderAll(true);
          });
        }, 100);

        // 第二次刷新（1500ms，解决 Supabase 读副本延迟）
        setTimeout(function () {
          _cachedHistory = null;
          refreshHistoryCache().then(function () {
            console.log('[统计] 第二次刷新，记录数:', _cachedHistory ? _cachedHistory.length : 0);
            renderAll(true);
          });
        }, 3000);
      });

      // ---------- storage 事件监听（跨页面登录/退出同步） ----------
      // BroadcastChannel 监听（跨页面数据同步）
      var bc = new BroadcastChannel('minimal_ledger_sync');
      var refreshTimer = null;
      bc.onmessage = function (event) {
        if (event.data && event.data.type === 'data_changed') {
          clearTimeout(refreshTimer);
          refreshTimer = setTimeout(function () {
            // 确保已登录，否则先获取 session
            if (!currentUser && supabase) {
              supabase.auth.getSession().then(function (result) {
                var sessionData = result.data;
                if (sessionData && sessionData.session && sessionData.session.user) {
                  currentUser = sessionData.session.user;
                  window.__currentUser = currentUser;
                }
                // 刷新数据
                _cachedHistory = null;
                refreshHistoryCache().then(function () {
                  renderAll(false);
                });
              });
            } else {
              // 已登录，直接刷新
              _cachedHistory = null;
              refreshHistoryCache().then(function () {
                renderAll(false);
              });
            }
          }, 150);
        }
      };

      // storage 事件保留（登录/退出状态同步）
      window.addEventListener('storage', function (e) {
        if (e.key === 'auth_state_changed') {
          if (supabase) {
            supabase.auth.getSession().then(function (result) {
              var sessionData = result.data;
              if (sessionData && sessionData.session && sessionData.session.user) {
                currentUser = sessionData.session.user;
                window.__currentUser = currentUser;
              } else {
                currentUser = null;
                window.__currentUser = null;
              }
              refreshHistoryCache().then(function () { renderAll(false); });
            }).catch(function () {
              currentUser = null;
              window.__currentUser = null;
              refreshHistoryCache().then(function () { renderAll(false); });
            });
          }
        }
      });
    })();
  </script>

</body>
