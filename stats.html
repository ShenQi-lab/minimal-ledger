<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>极简记账本 - 统计 V1.8.0</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FF8C42'/><text y='.9em' font-size='90' text-anchor='middle' fill='white'>💰</text></svg>">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --text: #2c2c2c;
      --text-light: #666666;
      --accent: #FF8C42;
      --accent-hover: #e67830;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial,
        sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 64px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .page {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ---------- 标题 ---------- */
    .stats-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* ---------- 月份切换器 ---------- */
    .month-switcher {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 100%;
      justify-content: center;
      position: relative;
    }

    .month-arrow {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #f0f0f0;
      color: #555;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, transform 0.1s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .month-arrow:hover {
      background: #e0e0e0;
    }

    .month-arrow:active {
      transform: scale(0.9);
    }

    .month-arrow:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    .month-label {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      min-width: 100px;
      text-align: center;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s ease;
    }

    .month-label:hover {
      background: #f5f5f5;
    }

    .month-label::after {
      content: " ▾";
      font-size: 0.75rem;
      color: #999;
    }

    /* ---------- 月份面板 ---------- */
    .month-panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 110;
      animation: fadeIn 0.18s ease;
    }

    .month-panel-overlay.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .month-panel-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px 16px;
      width: 260px;
      max-width: 90vw;
      max-height: 60vh;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
    }

    .month-panel-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      text-align: center;
      flex-shrink: 0;
    }

    .month-panel-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .month-panel-item {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      transition: background 0.12s ease, color 0.12s ease;
    }

    .month-panel-item:hover {
      background: #f5f5f5;
    }

    .month-panel-item.active {
      background: #fff5ee;
      color: var(--accent);
      font-weight: 600;
    }

    /* ---------- 统计卡片 ---------- */
    .stats-cards {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .stat-card {
      flex: 1;
      background: #fafafa;
      border-radius: var(--radius);
      padding: 18px 14px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-card-label {
      font-size: 0.82rem;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .stat-card-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-card-value.increase {
      color: #e04848;
    }

    .stat-card-value.decrease {
      color: #2eaa6e;
    }

    /* ---------- 折线图容器 ---------- */
    .chart-wrapper {
      width: 100%;
      background: #fafafa;
      border-radius: var(--radius);
      padding: 16px 12px;
      box-shadow: var(--shadow);
    }

    .chart-wrapper canvas {
      width: 100% !important;
      height: 220px !important;
    }

    .chart-empty {
      text-align: center;
      color: #b0b0b0;
      font-size: 0.9rem;
      padding: 60px 0;
    }

    /* ---------- 每日明细列表 ---------- */
    .daily-detail-section {
      width: 100%;
      background: #fafafa;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .daily-detail-summary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-light);
      transition: background 0.12s ease;
    }

    .daily-detail-summary:hover {
      background: #f0f0f0;
    }

    .daily-detail-summary.empty {
      color: #b0b0b0;
      cursor: default;
    }

    .daily-detail-summary.empty:hover {
      background: transparent;
    }

    .daily-detail-list {
      max-height: 280px;
      overflow-y: auto;
      border-top: 1px solid #eee;
    }

    .daily-detail-list.hidden {
      display: none;
    }

    .daily-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      font-size: 0.88rem;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s ease;
    }

    .daily-item:last-child {
      border-bottom: none;
      padding-bottom: 14px;
    }

    .daily-item.has-spending {
      cursor: pointer;
    }

    .daily-item.has-spending:hover {
      background: #fff5ee;
    }

    .daily-item-date {
      color: var(--text);
    }

    .daily-item-amount {
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
    }

    .daily-item-amount.zero {
      color: #bbb;
      font-weight: 400;
    }

    .daily-item-amount.spending {
      color: var(--accent);
    }

    .daily-item-arrow {
      font-size: 0.75rem;
      color: #ccc;
    }

    /* ---------- 日明细浮层 ---------- */
    .day-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 120;
      animation: fadeIn 0.18s ease;
    }

    .day-detail-overlay.hidden {
      display: none;
    }

    .day-detail-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 380px;
      max-width: 92vw;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .day-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .day-detail-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .day-detail-close {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .day-detail-close:hover {
      background: #d5d5d5;
    }

    .day-detail-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .day-record-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #fafafa;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .day-record-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .day-record-amount {
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .day-record-note {
      color: var(--text-light);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .day-record-time {
      color: #b0b0b0;
      font-size: 0.8rem;
      white-space: nowrap;
      margin-left: 10px;
    }

    /* ---------- 底部导航栏 ---------- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      height: 56px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 90;
      box-shadow: 0 -1px 6px rgba(0, 0, 0, 0.04);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      background: none;
      border: none;
      color: #b0b0b0;
      font-size: 0.7rem;
      padding: 4px 16px;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }

    .nav-item .nav-icon {
      font-size: 1.35rem;
      line-height: 1;
    }

    .nav-item.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* ========== 移动端优化 ========== */
    @media (max-width: 480px) {
      .page {
        padding: 28px 18px 20px;
        gap: 20px;
      }

      .stat-card-value {
        font-size: 1.35rem;
      }

      .chart-wrapper canvas {
        height: 180px !important;
      }
    }
  </style>
</head>
<body>

  <div class="page" id="statsPage">
    <!-- 标题 -->
    <h1 class="stats-title">月度统计</h1>

    <!-- 月份切换 -->
    <div class="month-switcher">
      <button class="month-arrow" id="prevMonthBtn" title="上一个月">◀</button>
      <span class="month-label" id="monthLabel">2026年5月</span>
      <button class="month-arrow" id="nextMonthBtn" title="下一个月">▶</button>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-cards">
      <div class="stat-card">
        <div class="stat-card-label">本月总支出</div>
        <div class="stat-card-value" id="monthTotal">0元</div>
      </div>
      <div class="stat-card" id="compareCard">
        <div class="stat-card-label">较上月</div>
        <div class="stat-card-value" id="monthCompare">--</div>
      </div>
    </div>

    <!-- 折线图 -->
    <div class="chart-wrapper" id="chartWrapper">
      <canvas id="dailyChart"></canvas>
      <div class="chart-empty hidden" id="chartEmpty">本月暂无记录</div>
    </div>

    <!-- 每日明细列表 -->
    <div class="daily-detail-section" id="dailyDetailSection">
      <div class="daily-detail-summary" id="dailyDetailSummary">
        ▼ 查看每日明细（已消费 0 天）
      </div>
      <div class="daily-detail-list hidden" id="dailyDetailList"></div>
    </div>

    <!-- 月份面板弹窗 -->
    <div class="month-panel-overlay hidden" id="monthPanelOverlay">
      <div class="month-panel-box">
        <div class="month-panel-title">选择月份</div>
        <div class="month-panel-list" id="monthPanelList"></div>
      </div>
    </div>

    <!-- 日明细浮层 -->
    <div class="day-detail-overlay hidden" id="dayDetailOverlay">
      <div class="day-detail-box">
        <div class="day-detail-header">
          <span class="day-detail-title" id="dayDetailTitle">5月5日 明细</span>
          <button class="day-detail-close" id="dayDetailCloseBtn">✕</button>
        </div>
        <div class="day-detail-list" id="dayDetailList"></div>
      </div>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <nav class="bottom-nav">
    <a class="nav-item" href="index.html" id="navLedger">
      <span class="nav-icon">📝</span>
      <span>记账</span>
    </a>
    <a class="nav-item active" href="stats.html" id="navStats">
      <span class="nav-icon">📊</span>
      <span>统计</span>
    </a>
  </nav>

  <!-- Service Worker 注册 -->
  <script>
    if ("serviceWorker" in navigator) {
      // 检测 SW 更新后自动刷新页面
      var refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").then(function (registration) {
          console.log("[极简记账本] Service Worker 注册成功，scope:", registration.scope);
          // 如果 SW 已更新但尚未激活，主动发送 skipWaiting 消息
          if (registration.waiting) {
            registration.waiting.postMessage({ type: "SKIP_WAITING" });
          }
          registration.addEventListener("updatefound", function () {
            var newWorker = registration.installing;
            if (newWorker) {
              newWorker.addEventListener("statechange", function () {
                if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                  // 新 SW 已安装完毕，发送 skipWaiting 并等待 controllerchange 触发刷新
                  newWorker.postMessage({ type: "SKIP_WAITING" });
                }
              });
            }
          });
        }).catch(function (err) {
          console.error("[极简记账本] Service Worker 注册失败:", err);
        });
      });
    }
  </script>

  <script>
    (function () {
      // ---------- DOM 元素 ----------
      const monthLabel = document.getElementById("monthLabel");
      const prevMonthBtn = document.getElementById("prevMonthBtn");
      const nextMonthBtn = document.getElementById("nextMonthBtn");
      const monthTotalEl = document.getElementById("monthTotal");
      const monthCompareEl = document.getElementById("monthCompare");
      const chartWrapper = document.getElementById("chartWrapper");
      const chartEmpty = document.getElementById("chartEmpty");
      const canvas = document.getElementById("dailyChart");
      const ctx = canvas.getContext("2d");

      // 月份面板
      const monthPanelOverlay = document.getElementById("monthPanelOverlay");
      const monthPanelList = document.getElementById("monthPanelList");

      // 每日明细
      const dailyDetailSection = document.getElementById("dailyDetailSection");
      const dailyDetailSummary = document.getElementById("dailyDetailSummary");
      const dailyDetailList = document.getElementById("dailyDetailList");

      // 日明细浮层
      const dayDetailOverlay = document.getElementById("dayDetailOverlay");
      const dayDetailTitle = document.getElementById("dayDetailTitle");
      const dayDetailListEl = document.getElementById("dayDetailList");
      const dayDetailCloseBtn = document.getElementById("dayDetailCloseBtn");

      // ---------- localStorage key ----------
      const HISTORY_KEY = "minimal_ledger_history";

      // ---------- 状态 ----------
      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth() + 1; // 1-12
      let chart = null;
      let dailyDetailExpanded = false; // 明细列表是否展开

      // ---------- 格式化金额 ----------
      function formatAmount(value) {
        return parseFloat(value.toFixed(2));
      }

      // ---------- 读取所有历史记录 ----------
      function loadHistory() {
        var stored = localStorage.getItem(HISTORY_KEY);
        if (stored === null) return [];
        try {
          var parsed = JSON.parse(stored);
          if (!Array.isArray(parsed)) return [];
          return parsed.filter(function (v) {
            return v && typeof v.amount === "number" && typeof v.date === "string";
          });
        } catch (e) {
          return [];
        }
      }

      // ---------- 获取某年某月的日期范围 ----------
      function getMonthDates(year, month) {
        var daysInMonth = new Date(year, month, 0).getDate(); // month is 1-indexed, this trick works
        var dates = [];
        for (var d = 1; d <= daysInMonth; d++) {
          var m = month.toString().padStart(2, "0");
          var day = d.toString().padStart(2, "0");
          dates.push(year + "-" + m + "-" + day);
        }
        return dates;
      }

      // ---------- 汇总某月每日支出 ----------
      function aggregateByDay(year, month) {
        var dates = getMonthDates(year, month);
        var dailyMap = {};
        for (var i = 0; i < dates.length; i++) {
          dailyMap[dates[i]] = 0;
        }
        var history = loadHistory();
        var monthPrefix = year + "-" + month.toString().padStart(2, "0") + "-";
        for (var j = 0; j < history.length; j++) {
          var record = history[j];
          if (record.date.indexOf(monthPrefix) === 0 && dailyMap.hasOwnProperty(record.date)) {
            dailyMap[record.date] += record.amount;
          }
        }
        // 转为数组，按日期排序
        var result = [];
        for (var k = 0; k < dates.length; k++) {
          result.push({
            date: dates[k],
            day: parseInt(dates[k].split("-")[2], 10),
            amount: formatAmount(dailyMap[dates[k]])
          });
        }
        return result;
      }

      // ---------- 计算某月总支出 ----------
      function getMonthTotal(year, month) {
        var daily = aggregateByDay(year, month);
        var total = 0;
        for (var i = 0; i < daily.length; i++) {
          total += daily[i].amount;
        }
        return formatAmount(total);
      }

      // ---------- 获取所有有记录的月份 ----------
      function getAvailableMonths() {
        var history = loadHistory();
        var monthSet = {};
        for (var i = 0; i < history.length; i++) {
          var d = history[i].date;
          if (typeof d === "string" && d.length >= 7) {
            var ym = d.substring(0, 7); // "YYYY-MM"
            monthSet[ym] = true;
          }
        }
        var months = Object.keys(monthSet).sort(); // 正序排列
        return months;
      }

      // ---------- 判断是否可以切换到某个月 ----------
      function canGoToPrev() {
        var available = getAvailableMonths();
        if (available.length === 0) return false;
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        // 如果当前月不在可用月份中，查找最接近的前一个月份
        for (var i = available.length - 1; i >= 0; i--) {
          if (available[i] < currentYM) return true;
        }
        return false;
      }

      function canGoToNext() {
        var available = getAvailableMonths();
        if (available.length === 0) return false;
        var today = new Date();
        var nowYM = today.getFullYear() + "-" + (today.getMonth() + 1).toString().padStart(2, "0");
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        return currentYM < nowYM;
      }

      // ---------- 切换到上一个月 ----------
      function goToPrevMonth() {
        var available = getAvailableMonths();
        if (available.length === 0) return;
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        // 在可用月份中找到 < currentYM 的最大值
        var best = null;
        for (var i = 0; i < available.length; i++) {
          if (available[i] < currentYM) {
            best = available[i];
          }
        }
        if (best !== null) {
          var parts = best.split("-");
          currentYear = parseInt(parts[0], 10);
          currentMonth = parseInt(parts[1], 10);
          collapseDailyDetail();
          renderAll();
        }
      }

      // ---------- 切换到下一个月 ----------
      function goToNextMonth() {
        var today = new Date();
        var nowYM = today.getFullYear() + "-" + (today.getMonth() + 1).toString().padStart(2, "0");
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        if (currentYM >= nowYM) return; // 不能超过当前月
        // 直接 +1 月
        if (currentMonth === 12) {
          currentYear++;
          currentMonth = 1;
        } else {
          currentMonth++;
        }
        collapseDailyDetail();
        renderAll();
      }

      // ---------- 更新统计卡片 ----------
      function updateStatsCards() {
        var monthTotal = getMonthTotal(currentYear, currentMonth);
        monthTotalEl.textContent = monthTotal + "元";

        // 计算上月总支出
        var prevYear = currentYear;
        var prevMonth = currentMonth - 1;
        if (prevMonth === 0) {
          prevYear = currentYear - 1;
          prevMonth = 12;
        }
        var prevTotal = getMonthTotal(prevYear, prevMonth);

        var compareCard = document.getElementById("compareCard");
        if (prevTotal === 0 && monthTotal === 0) {
          monthCompareEl.textContent = "--";
          monthCompareEl.className = "stat-card-value";
        } else if (prevTotal === 0) {
          monthCompareEl.textContent = "上月无记录";
          monthCompareEl.className = "stat-card-value increase";
        } else {
          var diff = formatAmount(monthTotal - prevTotal);
          var pct = formatAmount(Math.abs((monthTotal - prevTotal) / prevTotal) * 100);
          var sign = diff >= 0 ? "+" : "";
          var arrow = diff >= 0 ? "↑" : "↓";
          monthCompareEl.textContent = sign + diff + "元 " + arrow + pct + "%";
          monthCompareEl.className = "stat-card-value " + (diff >= 0 ? "increase" : "decrease");
        }
      }

      // ---------- 更新折线图 ----------
      function updateChart() {
        var daily = aggregateByDay(currentYear, currentMonth);
        var labels = [];
        var data = [];
        for (var i = 0; i < daily.length; i++) {
          labels.push(daily[i].day + "日");
          data.push(daily[i].amount);
        }

        // 检查是否有非零数据
        var hasData = false;
        for (var j = 0; j < data.length; j++) {
          if (data[j] > 0) { hasData = true; break; }
        }

        if (!hasData) {
          // 无数据
          canvas.style.display = "none";
          chartEmpty.classList.remove("hidden");
          if (chart) { chart.destroy(); chart = null; }
          return;
        }

        canvas.style.display = "block";
        chartEmpty.classList.add("hidden");

        if (chart) { chart.destroy(); chart = null; }

        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [{
              label: "日支出 (元)",
              data: data,
              borderColor: "#FF8C42",
              backgroundColor: "rgba(255, 140, 66, 0.08)",
              borderWidth: 2,
              fill: true,
              tension: 0.3,
              pointRadius: function (ctx) {
                return ctx.raw > 0 ? 3 : 0;
              },
              pointBackgroundColor: "#FF8C42",
              pointBorderColor: "#fff",
              pointBorderWidth: 1.5,
              pointHoverRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: false
              },
              tooltip: {
                backgroundColor: "#2c2c2c",
                titleColor: "#fff",
                bodyColor: "#fff",
                cornerRadius: 6,
                padding: 10,
                callbacks: {
                  label: function (ctx) {
                    return ctx.parsed.y + " 元";
                  }
                }
              }
            },
            scales: {
              x: {
                grid: {
                  display: false
                },
                ticks: {
                  font: { size: 11 },
                  color: "#999",
                  maxTicksLimit: 15
                }
              },
              y: {
                beginAtZero: true,
                grid: {
                  color: "#f0f0f0"
                },
                ticks: {
                  font: { size: 11 },
                  color: "#999",
                  callback: function (value) {
                    return value + "元";
                  }
                }
              }
            },
            interaction: {
              intersect: false,
              mode: "index"
            }
          }
        });

        // 设置 canvas 高度
        canvas.parentElement.style.height = "220px";
      }

      // ---------- 更新月份标签 ----------
      function updateMonthLabel() {
        monthLabel.textContent = currentYear + "年" + currentMonth + "月";
        prevMonthBtn.disabled = !canGoToPrev();
        nextMonthBtn.disabled = !canGoToNext();
      }

      // ---------- 渲染每日明细列表 ----------
      function renderDailyDetail() {
        var daily = aggregateByDay(currentYear, currentMonth);

        // 统计有消费的天数
        var spendingDays = 0;
        for (var i = 0; i < daily.length; i++) {
          if (daily[i].amount > 0) spendingDays++;
        }

        var monthStr = currentMonth + "月";

        if (spendingDays === 0) {
          // 无记录
          dailyDetailSummary.textContent = "本月暂无记录";
          dailyDetailSummary.className = "daily-detail-summary empty";
          dailyDetailSummary.style.cursor = "default";
          dailyDetailList.classList.add("hidden");
        } else if (dailyDetailExpanded) {
          // 展开状态
          dailyDetailSummary.textContent = "▲ 收起明细";
          dailyDetailSummary.className = "daily-detail-summary";
          dailyDetailSummary.style.cursor = "pointer";
          dailyDetailList.classList.remove("hidden");

          // 渲染列表
          dailyDetailList.innerHTML = "";
          for (var j = 0; j < daily.length; j++) {
            var item = daily[j];
            var itemDiv = document.createElement("div");
            itemDiv.className = "daily-item";

            var dateSpan = document.createElement("span");
            dateSpan.className = "daily-item-date";
            dateSpan.textContent = monthStr + item.day + "日";

            var amountDiv = document.createElement("div");
            amountDiv.className = "daily-item-amount";

            var amountSpan = document.createElement("span");
            amountSpan.textContent = formatAmount(item.amount) + "元";

            var arrowSpan = document.createElement("span");
            arrowSpan.className = "daily-item-arrow";

            if (item.amount > 0) {
              itemDiv.classList.add("has-spending");
              amountDiv.className = "daily-item-amount spending";
              arrowSpan.textContent = "▸";
              // 点击打开日明细浮层
              (function (dateStr, dayNum) {
                itemDiv.addEventListener("click", function () {
                  openDayDetail(dateStr, monthStr + dayNum + "日");
                });
              })(item.date, item.day);
            } else {
              amountDiv.className = "daily-item-amount zero";
            }

            amountDiv.appendChild(amountSpan);
            amountDiv.appendChild(arrowSpan);
            itemDiv.appendChild(dateSpan);
            itemDiv.appendChild(amountDiv);
            dailyDetailList.appendChild(itemDiv);
          }
        } else {
          // 折叠状态
          dailyDetailSummary.textContent = "▼ 查看每日明细（已消费 " + spendingDays + " 天）";
          dailyDetailSummary.className = "daily-detail-summary";
          dailyDetailSummary.style.cursor = "pointer";
          dailyDetailList.classList.add("hidden");
        }
      }

      // ---------- 展开/折叠每日明细切换 ----------
      function toggleDailyDetail() {
        var daily = aggregateByDay(currentYear, currentMonth);
        var spendingDays = 0;
        for (var i = 0; i < daily.length; i++) {
          if (daily[i].amount > 0) spendingDays++;
        }
        if (spendingDays === 0) return; // 无记录时不响应点击
        dailyDetailExpanded = !dailyDetailExpanded;
        renderDailyDetail();
      }

      // ---------- 折叠每日明细 ----------
      function collapseDailyDetail() {
        dailyDetailExpanded = false;
        renderDailyDetail();
      }

      // ---------- 打开日明细浮层 ----------
      function openDayDetail(dateStr, displayDate) {
        var history = loadHistory();
        var records = [];
        for (var i = 0; i < history.length; i++) {
          if (history[i].date === dateStr) {
            records.push(history[i]);
          }
        }

        dayDetailTitle.textContent = displayDate + " 明细";
        dayDetailListEl.innerHTML = "";

        // 时间倒序
        var reversed = records.slice().reverse();
        for (var j = 0; j < reversed.length; j++) {
          var record = reversed[j];

          var itemDiv = document.createElement("div");
          itemDiv.className = "day-record-item";

          var leftDiv = document.createElement("div");
          leftDiv.className = "day-record-left";

          var amountSpan = document.createElement("span");
          amountSpan.className = "day-record-amount";
          amountSpan.textContent = "+" + formatAmount(record.amount) + "元";

          var noteSpan = document.createElement("span");
          noteSpan.className = "day-record-note";
          noteSpan.textContent = record.note || "未备注";

          leftDiv.appendChild(amountSpan);
          leftDiv.appendChild(noteSpan);

          var timeSpan = document.createElement("span");
          timeSpan.className = "day-record-time";
          timeSpan.textContent = record.time || "--:--";

          itemDiv.appendChild(leftDiv);
          itemDiv.appendChild(timeSpan);
          dayDetailListEl.appendChild(itemDiv);
        }

        dayDetailOverlay.classList.remove("hidden");
      }

      // ---------- 关闭日明细浮层 ----------
      function closeDayDetail() {
        dayDetailOverlay.classList.add("hidden");
      }

      // ---------- 月份面板：打开 ----------
      function openMonthPanel() {
        var available = getAvailableMonths();
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");

        monthPanelList.innerHTML = "";
        if (available.length === 0) {
          var emptyDiv = document.createElement("div");
          emptyDiv.className = "month-panel-item";
          emptyDiv.textContent = "暂无记录";
          emptyDiv.style.color = "#b0b0b0";
          emptyDiv.style.cursor = "default";
          monthPanelList.appendChild(emptyDiv);
        } else {
          for (var i = 0; i < available.length; i++) {
            var ym = available[i];
            var parts = ym.split("-");
            var y = parseInt(parts[0], 10);
            var m = parseInt(parts[1], 10);
            var label = y + "年" + m + "月";

            var itemDiv = document.createElement("div");
            itemDiv.className = "month-panel-item";
            if (ym === currentYM) {
              itemDiv.classList.add("active");
            }
            itemDiv.textContent = label;
            (function (year, month) {
              itemDiv.addEventListener("click", function () {
                selectMonth(year, month);
              });
            })(y, m);
            monthPanelList.appendChild(itemDiv);
          }
        }

        monthPanelOverlay.classList.remove("hidden");
      }

      // ---------- 月份面板：关闭 ----------
      function closeMonthPanel() {
        monthPanelOverlay.classList.add("hidden");
      }

      // ---------- 月份面板：选择月份 ----------
      function selectMonth(year, month) {
        currentYear = year;
        currentMonth = month;
        collapseDailyDetail();
        renderAll();
        closeMonthPanel();
      }

      // ---------- 渲染全部 ----------
      function renderAll() {
        updateMonthLabel();
        updateStatsCards();
        updateChart();
        renderDailyDetail();
      }

      // ---------- 初始化：默认显示当前月 ----------
      function init() {
        var today = new Date();
        currentYear = today.getFullYear();
        currentMonth = today.getMonth() + 1;
        renderAll();
      }

      // ---------- 事件绑定 ----------
      prevMonthBtn.addEventListener("click", goToPrevMonth);
      nextMonthBtn.addEventListener("click", goToNextMonth);

      // 月份标签点击打开面板
      monthLabel.addEventListener("click", openMonthPanel);

      // 点击面板遮罩关闭
      monthPanelOverlay.addEventListener("click", function (e) {
        if (e.target === monthPanelOverlay) {
          closeMonthPanel();
        }
      });

      // 每日明细摘要点击切换
      dailyDetailSummary.addEventListener("click", toggleDailyDetail);

      // 日明细浮层关闭
      dayDetailCloseBtn.addEventListener("click", closeDayDetail);
      dayDetailOverlay.addEventListener("click", function (e) {
        if (e.target === dayDetailOverlay) {
          closeDayDetail();
        }
      });

      // ---------- 启动 ----------
      init();
    })();
  </script>

</body>
</html>
