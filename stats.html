<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>极简记账本 - 统计 V1.9.3</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FF8C42'/><text y='.9em' font-size='90' text-anchor='middle' fill='white'>💰</text></svg>">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --text: #2c2c2c;
      --text-light: #666666;
      --accent: #FF8C42;
      --accent-hover: #e67830;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial,
        sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 64px;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .page {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ---------- 标题 ---------- */
    .stats-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* ---------- 月份切换器 ---------- */
    .month-switcher {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 100%;
      justify-content: center;
    }

    .month-arrow {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #f0f0f0;
      color: #555;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, transform 0.1s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .month-arrow:hover {
      background: #e0e0e0;
    }

    .month-arrow:active {
      transform: scale(0.9);
    }

    .month-arrow:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    .month-label {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      min-width: 100px;
      text-align: center;
      cursor: pointer;
    }

    /* ---------- 月份面板 ---------- */
    .month-panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.18s ease;
    }

    .month-panel-overlay.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .month-panel-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 300px;
      max-width: 90vw;
      max-height: 60vh;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .month-panel-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      text-align: center;
    }

    .month-panel-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 40vh;
      overflow-y: auto;
    }

    .month-panel-item {
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text);
      transition: background 0.12s ease;
      text-align: center;
    }

    .month-panel-item:hover {
      background: #f5f5f5;
    }

    .month-panel-item.active {
      background: #fff3eb;
      color: var(--accent);
      font-weight: 600;
    }

    /* ---------- 统计卡片 ---------- */
    .stats-cards {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .stat-card {
      flex: 1;
      background: #fafafa;
      border-radius: var(--radius);
      padding: 18px 14px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-card-label {
      font-size: 0.82rem;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .stat-card-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-card-value.increase {
      color: #e04848;
    }

    .stat-card-value.decrease {
      color: #2eaa6e;
    }

    /* ---------- 折线图容器 ---------- */
    .chart-wrapper {
      width: 100%;
      background: #fafafa;
      border-radius: var(--radius);
      padding: 16px 12px;
      box-shadow: var(--shadow);
    }

    .chart-wrapper canvas {
      width: 100% !important;
      height: 220px !important;
    }

    .chart-empty {
      text-align: center;
      color: #b0b0b0;
      font-size: 0.9rem;
      padding: 60px 0;
    }

    /* ---------- 每日明细 ---------- */
    .daily-detail-section {
      width: 100%;
    }

    .daily-detail-summary {
      font-size: 0.9rem;
      color: var(--text-light);
      text-align: center;
      padding: 8px 0;
      -webkit-user-select: none;
      user-select: none;
    }

    .daily-detail-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .daily-detail-list.hidden {
      display: none;
    }

    .daily-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #fafafa;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s ease;
      font-size: 0.9rem;
    }

    .daily-item:hover {
      background: #f0f0f0;
    }

    .daily-item:active {
      background: #e8e8e8;
    }

    .daily-item-date {
      font-weight: 500;
      color: var(--text);
    }

    .daily-item-amount {
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .daily-item-amount.zero {
      color: #b0b0b0;
    }

    .daily-item-arrow {
      font-size: 0.7rem;
      color: #b0b0b0;
    }

    /* ---------- 日明细浮层 ---------- */
    .day-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.18s ease;
    }

    .day-detail-overlay.hidden {
      display: none;
    }

    .day-detail-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 380px;
      max-width: 92vw;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
      user-select: auto;
      -webkit-user-select: auto;
    }

    .day-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .day-detail-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .day-detail-close {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .day-detail-close:hover {
      background: #d5d5d5;
    }

    .day-detail-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .day-record-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #fafafa;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .day-record-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .day-record-amount {
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .day-record-note {
      color: var(--text-light);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .day-record-time {
      color: #b0b0b0;
      font-size: 0.8rem;
      white-space: nowrap;
      margin-left: 10px;
    }

    /* ---------- 日明细浮层：操作按钮 ---------- */
    .day-record-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 6px;
      flex-shrink: 0;
    }

    .day-record-action-btn {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: transparent;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      color: #999;
    }

    .day-record-action-btn:hover {
      background: #e8e8e8;
      color: #555;
    }

    .day-record-action-btn:active {
      transform: scale(0.88);
      background: #ddd;
    }

    .day-record-action-btn.delete-btn:hover {
      background: #fee;
      color: #d44;
    }

    /* ---------- 日明细浮层：编辑态 ---------- */
    .day-record-edit-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .day-record-edit-date-label {
      font-size: 0.82rem;
      color: var(--text);
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .day-record-edit-input {
      border: 1.5px solid var(--input-border, #d5d5d5);
      border-radius: 5px;
      padding: 3px 6px;
      font-size: 0.82rem;
      outline: none;
      width: 60px;
      text-align: center;
      transition: border-color 0.15s ease;
      -webkit-appearance: none;
    }

    .day-record-edit-input:focus {
      border-color: var(--accent);
    }

    .day-record-edit-input.note-input {
      flex: 1;
      min-width: 50px;
      text-align: left;
    }

    .day-record-edit-input.time-input {
      width: 80px;
      text-align: center;
    }

    .day-record-edit-input:placeholder-shown {
      color: #b0b0b0;
    }

    .day-record-edit-save {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .day-record-edit-save:hover {
      background: var(--accent-hover);
    }

    .day-record-edit-save:active {
      transform: scale(0.9);
    }

    .day-record-edit-cancel {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .day-record-edit-cancel:hover {
      background: hsl(0, 0%, 84%);
    }

    /* ---------- 日明细浮层："+ 记一笔"按钮 ---------- */
    .day-detail-add-btn {
      width: 100%;
      height: 40px;
      border: 1.5px dashed var(--accent);
      border-radius: 8px;
      background: #fff8f3;
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .day-detail-add-btn:hover {
      background: #fff0e6;
    }

    .day-detail-add-btn:active {
      transform: scale(0.97);
      background: #ffe8d6;
    }

    /* ---------- 底部导航栏 ---------- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      height: 56px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 90;
      box-shadow: 0 -1px 6px rgba(0, 0, 0, 0.04);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      background: none;
      border: none;
      color: #b0b0b0;
      font-size: 0.7rem;
      padding: 4px 16px;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }

    .nav-item .nav-icon {
      font-size: 1.35rem;
      line-height: 1;
    }

    .nav-item.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* ========== 移动端优化 ========== */
    @media (max-width: 480px) {
      .page {
        padding: 28px 18px 20px;
        gap: 20px;
      }

      .stat-card-value {
        font-size: 1.35rem;
      }

      .chart-wrapper canvas {
        height: 180px !important;
      }
    }
  </style>
</head>

  <!-- Service Worker 注册 -->
  <script>
    if ("serviceWorker" in navigator) {
      // 检测 SW 更新后自动刷新页面
      var refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").then(function (registration) {
          console.log("[极简记账本] Service Worker 注册成功，scope:", registration.scope);
          // 如果 SW 已更新但尚未激活，主动发送 skipWaiting 消息
          if (registration.waiting) {
            registration.waiting.postMessage({ type: "SKIP_WAITING" });
          }
          registration.addEventListener("updatefound", function () {
            var newWorker = registration.installing;
            if (newWorker) {
              newWorker.addEventListener("statechange", function () {
                if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                  // 新 SW 已安装完毕，发送 skipWaiting 并等待 controllerchange 触发刷新
                  newWorker.postMessage({ type: "SKIP_WAITING" });
                }
              });
            }
          });
        }).catch(function (err) {
          console.error("[极简记账本] Service Worker 注册失败:", err);
        });
      });
    }
  </script>

  <script>
    (function () {
      // ---------- DOM 元素 ----------
      const monthLabel = document.getElementById("monthLabel");
      const prevMonthBtn = document.getElementById("prevMonthBtn");
      const nextMonthBtn = document.getElementById("nextMonthBtn");
      const monthTotalEl = document.getElementById("monthTotal");
      const monthCompareEl = document.getElementById("monthCompare");
      const chartWrapper = document.getElementById("chartWrapper");
      const chartEmpty = document.getElementById("chartEmpty");
      const canvas = document.getElementById("dailyChart");
      const ctx = canvas.getContext("2d");
      const dailyDetailSummary = document.getElementById("dailyDetailSummary");
      const dailyDetailList = document.getElementById("dailyDetailList");
      const dayDetailOverlay = document.getElementById("dayDetailOverlay");
      const dayDetailTitle = document.getElementById("dayDetailTitle");
      const dayDetailListEl = document.getElementById("dayDetailList");
      const dayDetailCloseBtn = document.getElementById("dayDetailCloseBtn");
      const dayDetailAddBtn = document.getElementById("dayDetailAddBtn");
      const monthPanelOverlay = document.getElementById("monthPanelOverlay");
      const monthPanelList = document.getElementById("monthPanelList");

      // ---------- localStorage key ----------
      const HISTORY_KEY = "minimal_ledger_history";

      // ---------- 状态 ----------
      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth() + 1; // 1-12
      let dailyDetailExpanded = false;
      let chart = null;
      // 当前打开的日明细浮层对应的日期
      let currentDayDetailDate = null;
      // 浮层中正在添加新记录的状态标记
      let isAddingNewRecord = false;

      // ---------- 格式化金额 ----------
      function formatAmount(value) {
        return parseFloat(value.toFixed(2));
      }

      // ---------- 读取所有历史记录 ----------
      function loadHistory() {
        var stored = localStorage.getItem(HISTORY_KEY);
        if (stored === null) return [];
        try {
          var parsed = JSON.parse(stored);
          if (!Array.isArray(parsed)) return [];
          return parsed.filter(function (v) {
            return v && typeof v.amount === "number" && typeof v.date === "string";
          });
        } catch (e) {
          return [];
        }
      }

      // ---------- 保存历史记录到 localStorage ----------
      function saveHistory(historyArray) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(historyArray));
      }

      // ---------- 获取某年某月的日期范围 ----------
      function getMonthDates(year, month) {
        var daysInMonth = new Date(year, month, 0).getDate(); // month is 1-indexed, this trick works
        var dates = [];
        for (var d = 1; d <= daysInMonth; d++) {
          var m = month.toString().padStart(2, "0");
          var day = d.toString().padStart(2, "0");
          dates.push(year + "-" + m + "-" + day);
        }
        return dates;
      }

      // ---------- 汇总某月每日支出 ----------
      function aggregateByDay(year, month) {
        var dates = getMonthDates(year, month);
        var dailyMap = {};
        for (var i = 0; i < dates.length; i++) {
          dailyMap[dates[i]] = 0;
        }
        var history = loadHistory();
        var monthPrefix = year + "-" + month.toString().padStart(2, "0") + "-";
        for (var j = 0; j < history.length; j++) {
          var record = history[j];
          if (record.date.indexOf(monthPrefix) === 0 && dailyMap.hasOwnProperty(record.date)) {
            dailyMap[record.date] += record.amount;
          }
        }
        // 转为数组，按日期排序
        var result = [];
        for (var k = 0; k < dates.length; k++) {
          result.push({
            date: dates[k],
            day: parseInt(dates[k].split("-")[2], 10),
            amount: formatAmount(dailyMap[dates[k]])
          });
        }
        return result;
      }

      // ---------- 计算某月总支出 ----------
      function getMonthTotal(year, month) {
        var daily = aggregateByDay(year, month);
        var total = 0;
        for (var i = 0; i < daily.length; i++) {
          total += daily[i].amount;
        }
        return formatAmount(total);
      }

      // ---------- 获取所有有记录的月份 ----------
      function getAvailableMonths() {
        var history = loadHistory();
        var monthSet = {};
        for (var i = 0; i < history.length; i++) {
          var d = history[i].date;
          if (typeof d === "string" && d.length >= 7) {
            var ym = d.substring(0, 7); // "YYYY-MM"
            monthSet[ym] = true;
          }
        }
        var months = Object.keys(monthSet).sort(); // 正序排列
        return months;
      }

      // ---------- 判断是否可以切换到某个月 ----------
      function canGoToPrev() {
        var available = getAvailableMonths();
        if (available.length === 0) return false;
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        for (var i = available.length - 1; i >= 0; i--) {
          if (available[i] < currentYM) return true;
        }
        return false;
      }

      function canGoToNext() {
        var available = getAvailableMonths();
        if (available.length === 0) return false;
        var today = new Date();
        var nowYM = today.getFullYear() + "-" + (today.getMonth() + 1).toString().padStart(2, "0");
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        return currentYM < nowYM;
      }

      // ---------- 切换到上一个月 ----------
      function goToPrevMonth() {
        var available = getAvailableMonths();
        if (available.length === 0) return;
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        var best = null;
        for (var i = 0; i < available.length; i++) {
          if (available[i] < currentYM) {
            best = available[i];
          }
        }
        if (best !== null) {
          var parts = best.split("-");
          currentYear = parseInt(parts[0], 10);
          currentMonth = parseInt(parts[1], 10);
          collapseDailyDetail();
          renderAll();
        }
      }

      // ---------- 切换到下一个月 ----------
      function goToNextMonth() {
        var today = new Date();
        var nowYM = today.getFullYear() + "-" + (today.getMonth() + 1).toString().padStart(2, "0");
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");
        if (currentYM >= nowYM) return;
        if (currentMonth === 12) {
          currentYear++;
          currentMonth = 1;
        } else {
          currentMonth++;
        }
        collapseDailyDetail();
        renderAll();
      }

      // ---------- 更新统计卡片 ----------
      function updateStatsCards() {
        var monthTotal = getMonthTotal(currentYear, currentMonth);
        monthTotalEl.textContent = monthTotal + "元";

        var prevYear = currentYear;
        var prevMonth = currentMonth - 1;
        if (prevMonth === 0) {
          prevYear = currentYear - 1;
          prevMonth = 12;
        }
        var prevTotal = getMonthTotal(prevYear, prevMonth);

        if (prevTotal === 0 && monthTotal === 0) {
          monthCompareEl.textContent = "--";
          monthCompareEl.className = "stat-card-value";
        } else if (prevTotal === 0) {
          monthCompareEl.textContent = "上月无记录";
          monthCompareEl.className = "stat-card-value increase";
        } else {
          var diff = formatAmount(monthTotal - prevTotal);
          var pct = formatAmount(Math.abs((monthTotal - prevTotal) / prevTotal) * 100);
          var sign = diff >= 0 ? "+" : "";
          var arrow = diff >= 0 ? "↑" : "↓";
          monthCompareEl.textContent = sign + diff + "元 " + arrow + pct + "%";
          monthCompareEl.className = "stat-card-value " + (diff >= 0 ? "increase" : "decrease");
        }
      }

      // ---------- 更新折线图 ----------
      function updateChart() {
        var daily = aggregateByDay(currentYear, currentMonth);
        var labels = [];
        var data = [];
        for (var i = 0; i < daily.length; i++) {
          labels.push(daily[i].day + "日");
          data.push(daily[i].amount);
        }

        var hasData = false;
        for (var j = 0; j < data.length; j++) {
          if (data[j] > 0) { hasData = true; break; }
        }

        if (!hasData) {
          canvas.style.display = "none";
          chartEmpty.classList.remove("hidden");
          if (chart) { chart.destroy(); chart = null; }
          return;
        }

        canvas.style.display = "block";
        chartEmpty.classList.add("hidden");

        if (chart) { chart.destroy(); chart = null; }

        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [{
              label: "日支出 (元)",
              data: data,
              borderColor: "#FF8C42",
              backgroundColor: "rgba(255, 140, 66, 0.08)",
              borderWidth: 2,
              fill: true,
              tension: 0.3,
              pointRadius: function (ctx) {
                return ctx.raw > 0 ? 3 : 0;
              },
              pointBackgroundColor: "#FF8C42",
              pointBorderColor: "#fff",
              pointBorderWidth: 1.5,
              pointHoverRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: false
              },
              tooltip: {
                backgroundColor: "#2c2c2c",
                titleColor: "#fff",
                bodyColor: "#fff",
                cornerRadius: 6,
                padding: 10,
                callbacks: {
                  label: function (ctx) {
                    return ctx.parsed.y + " 元";
                  }
                }
              }
            },
            scales: {
              x: {
                grid: {
                  display: false
                },
                ticks: {
                  font: { size: 11 },
                  color: "#999",
                  maxTicksLimit: 15
                }
              },
              y: {
                beginAtZero: true,
                grid: {
                  color: "#f0f0f0"
                },
                ticks: {
                  font: { size: 11 },
                  color: "#999",
                  callback: function (value) {
                    return value + "元";
                  }
                }
              }
            },
            interaction: {
              intersect: false,
              mode: "index"
            }
          }
        });

        canvas.parentElement.style.height = "220px";
      }

      // ---------- 更新月份标签 ----------
      function updateMonthLabel() {
        monthLabel.textContent = currentYear + "年" + currentMonth + "月";
        prevMonthBtn.disabled = !canGoToPrev();
        nextMonthBtn.disabled = !canGoToNext();
      }

      // ---------- 渲染每日明细列表 ----------
      function renderDailyDetail() {
        var daily = aggregateByDay(currentYear, currentMonth);
        var spendingDays = 0;
        for (var i = 0; i < daily.length; i++) {
          if (daily[i].amount > 0) spendingDays++;
        }

        dailyDetailList.innerHTML = "";

        if (spendingDays === 0) {
          dailyDetailSummary.textContent = "▼ 每日明细（暂无消费记录）";
          dailyDetailSummary.style.cursor = "default";
          dailyDetailList.classList.add("hidden");
          dailyDetailExpanded = false;
          return;
        }

        if (dailyDetailExpanded) {
          dailyDetailSummary.textContent = "▲ 收起明细";
          dailyDetailSummary.style.cursor = "pointer";
          dailyDetailList.classList.remove("hidden");

          for (var i = 0; i < daily.length; i++) {
            if (daily[i].amount === 0) continue;
            var itemDiv = document.createElement("div");
            itemDiv.className = "daily-item";
            var dateParts = daily[i].date.split("-");
            var displayDate = parseInt(dateParts[2], 10) + "日";

            var dateSpan = document.createElement("span");
            dateSpan.className = "daily-item-date";
            dateSpan.textContent = displayDate;

            var amountDiv = document.createElement("div");
            var amountSpan = document.createElement("span");
            var arrowSpan = document.createElement("span");
            arrowSpan.className = "daily-item-arrow";
            arrowSpan.textContent = "❯";

            if (daily[i].amount > 0) {
              amountDiv.className = "daily-item-amount";
              amountSpan.textContent = formatAmount(daily[i].amount) + "元";
            } else {
              amountDiv.className = "daily-item-amount zero";
            }

            amountDiv.appendChild(amountSpan);
            amountDiv.appendChild(arrowSpan);
            itemDiv.appendChild(dateSpan);
            itemDiv.appendChild(amountDiv);

            // 点击打开日明细浮层
            (function (dateStr, dispDate) {
              itemDiv.addEventListener("click", function () {
                openDayDetail(dateStr, dispDate);
              });
            })(daily[i].date, displayDate);

            dailyDetailList.appendChild(itemDiv);
          }
        } else {
          dailyDetailSummary.textContent = "▼ 查看每日明细（已消费 " + spendingDays + " 天）";
          dailyDetailSummary.className = "daily-detail-summary";
          dailyDetailSummary.style.cursor = "pointer";
          dailyDetailList.classList.add("hidden");
        }
      }

      // ---------- 展开/折叠每日明细切换 ----------
      function toggleDailyDetail() {
        var daily = aggregateByDay(currentYear, currentMonth);
        var spendingDays = 0;
        for (var i = 0; i < daily.length; i++) {
          if (daily[i].amount > 0) spendingDays++;
        }
        if (spendingDays === 0) return;
        dailyDetailExpanded = !dailyDetailExpanded;
        renderDailyDetail();
      }

      // ---------- 折叠每日明细 ----------
      function collapseDailyDetail() {
        dailyDetailExpanded = false;
        renderDailyDetail();
      }

      // ---------- 打开日明细浮层 ----------
      function openDayDetail(dateStr, displayDate) {
        currentDayDetailDate = dateStr;
        isAddingNewRecord = false;
        renderDayDetailContent();
        dayDetailOverlay.classList.remove("hidden");
      }

      // ---------- 渲染日明细浮层内容 ----------
      function renderDayDetailContent() {
        var dateStr = currentDayDetailDate;
        if (!dateStr) return;

        var dateParts = dateStr.split("-");
        var displayDate = parseInt(dateParts[1], 10) + "月" + parseInt(dateParts[2], 10) + "日";
        dayDetailTitle.textContent = displayDate + " 明细";

        var history = loadHistory();
        var records = [];
        var recordIndices = []; // 记录在原 history 数组中的索引
        for (var i = 0; i < history.length; i++) {
          if (history[i].date === dateStr) {
            records.push(history[i]);
            recordIndices.push(i);
          }
        }

        dayDetailListEl.innerHTML = "";

        // 时间倒序（最新记录在上）
        var reversed = records.slice().reverse();
        var reversedIndices = recordIndices.slice().reverse();

        for (var j = 0; j < reversed.length; j++) {
          var record = reversed[j];
          var originalIndex = reversedIndices[j];

          var itemDiv = document.createElement("div");
          itemDiv.className = "day-record-item";
          itemDiv.setAttribute("data-original-index", originalIndex);

          var leftDiv = document.createElement("div");
          leftDiv.className = "day-record-left";

          var amountSpan = document.createElement("span");
          amountSpan.className = "day-record-amount";
          amountSpan.textContent = "+" + formatAmount(record.amount) + "元";

          var noteSpan = document.createElement("span");
          noteSpan.className = "day-record-note";
          noteSpan.textContent = record.note || "未备注";

          leftDiv.appendChild(amountSpan);
          leftDiv.appendChild(noteSpan);

          var timeSpan = document.createElement("span");
          timeSpan.className = "day-record-time";
          timeSpan.textContent = record.time || "--:--";

          // 操作按钮组
          var actionsDiv = document.createElement("div");
          actionsDiv.className = "day-record-actions";

          var editBtn = document.createElement("button");
          editBtn.className = "day-record-action-btn";
          editBtn.textContent = "✏️";
          editBtn.title = "编辑";
          editBtn.addEventListener("click", function (idx, div) {
            return function (e) { e.stopPropagation(); startEdit(idx, div); };
          }(originalIndex, itemDiv));

          var deleteBtn = document.createElement("button");
          deleteBtn.className = "day-record-action-btn delete-btn";
          deleteBtn.textContent = "🗑️";
          deleteBtn.title = "删除";
          deleteBtn.addEventListener("click", function (idx) {
            return function (e) { e.stopPropagation(); deleteRecord(idx); };
          }(originalIndex));

          actionsDiv.appendChild(editBtn);
          actionsDiv.appendChild(deleteBtn);

          itemDiv.appendChild(leftDiv);
          itemDiv.appendChild(actionsDiv);
          itemDiv.appendChild(timeSpan);
          dayDetailListEl.appendChild(itemDiv);
        }
      }

      // ---------- 刷新整个页面（数据变更后调用） ----------
      function refreshAll() {
        updateStatsCards();
        updateChart();
        renderDailyDetail();
        renderDayDetailContent();

        // 检查该日期是否还有记录，没有则自动关闭浮层
        var history = loadHistory();
        var hasRecords = false;
        for (var i = 0; i < history.length; i++) {
          if (history[i].date === currentDayDetailDate) {
            hasRecords = true;
            break;
          }
        }
        if (!hasRecords) {
          closeDayDetail();
        }
      }

      // ---------- 删除一条记录 ----------
      function deleteRecord(originalIndex) {
        if (!confirm("确定删除这条记录吗？")) return;
        var history = loadHistory();
        if (originalIndex < 0 || originalIndex >= history.length) return;
        history.splice(originalIndex, 1);
        saveHistory(history);
        refreshAll();
      }

      // ---------- 开始编辑一条记录 ----------
      function startEdit(originalIndex, itemDiv) {
        var history = loadHistory();
        if (originalIndex < 0 || originalIndex >= history.length) return;
        var record = history[originalIndex];

        // 标记该 item 为编辑态
        itemDiv.setAttribute("data-editing", "true");
        itemDiv.setAttribute("data-editing-index", originalIndex);

        itemDiv.innerHTML = "";

        var editRow = document.createElement("div");
        editRow.className = "day-record-edit-row";

        // 日期（只读）
        var dateLabel = document.createElement("span");
        dateLabel.className = "day-record-edit-date-label";
        dateLabel.textContent = record.date;

        // 时间输入框
        var timeInput = document.createElement("input");
        timeInput.type = "time";
        timeInput.className = "day-record-edit-input time-input";
        // 格式化为 HH:MM 供 time input 使用
        var timeVal = record.time || "";
        // time input 需要 HH:MM 格式
        if (timeVal && /^\d{2}:\d{2}(:\d{2})?$/.test(timeVal)) {
          timeInput.value = timeVal.substring(0, 5);
        } else {
          timeInput.value = "";
        }
        timeInput.setAttribute("placeholder", "请选择时间");

        // 金额输入框
        var amountEditInput = document.createElement("input");
        amountEditInput.type = "text";
        amountEditInput.inputMode = "decimal";
        amountEditInput.className = "day-record-edit-input";
        amountEditInput.value = formatAmount(record.amount);
        amountEditInput.addEventListener("input", function () {
          var val = this.value.replace(/[^0-9.]/g, "");
          var dotIdx = val.indexOf(".");
          if (dotIdx !== -1) {
            val = val.substring(0, dotIdx + 1) + val.substring(dotIdx + 1).replace(/\./g, "");
            if (val.substring(dotIdx + 1).length > 2) {
              val = val.substring(0, dotIdx + 3);
            }
          }
          this.value = val;
        });

        // 备注输入框
        var noteEditInput = document.createElement("input");
        noteEditInput.type = "text";
        noteEditInput.className = "day-record-edit-input note-input";
        noteEditInput.value = record.note || "";
        noteEditInput.placeholder = "备注";

        // 保存按钮
        var saveBtn = document.createElement("button");
        saveBtn.className = "day-record-edit-save";
        saveBtn.textContent = "✓";
        saveBtn.title = "保存";
        saveBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          saveEdit(originalIndex, timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim());
        });

        // 取消按钮
        var cancelBtn = document.createElement("button");
        cancelBtn.className = "day-record-edit-cancel";
        cancelBtn.textContent = "✕";
        cancelBtn.title = "取消";
        cancelBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          renderDayDetailContent();
        });

        editRow.appendChild(dateLabel);
        editRow.appendChild(timeInput);
        editRow.appendChild(amountEditInput);
        editRow.appendChild(noteEditInput);
        editRow.appendChild(saveBtn);
        editRow.appendChild(cancelBtn);

        itemDiv.appendChild(editRow);

        setTimeout(function () { amountEditInput.focus(); amountEditInput.select(); }, 50);

        // Enter 保存
        timeInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveEdit(originalIndex, timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
        amountEditInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveEdit(originalIndex, timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
        noteEditInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveEdit(originalIndex, timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
      }

      // ---------- 保存编辑 ----------
      function saveEdit(originalIndex, newTimeStr, newAmountStr, newNoteStr) {
        // 校验时间不能为空
        if (newTimeStr === "") {
          alert("请选择时间");
          return;
        }

        var newAmount = parseFloat(newAmountStr);
        if (isNaN(newAmount) || newAmount <= 0) return;

        var history = loadHistory();
        if (originalIndex < 0 || originalIndex >= history.length) return;

        // 格式化时间为 HH:MM:SS
        var formattedTime = newTimeStr.length === 5 ? newTimeStr + ":00" : newTimeStr;

        history[originalIndex].amount = newAmount;
        history[originalIndex].note = newNoteStr !== "" ? newNoteStr : "未备注";
        history[originalIndex].time = formattedTime;

        saveHistory(history);
        refreshAll();
      }

      // ---------- 开始新增一条记录 ----------
      function startAddRecord() {
        if (isAddingNewRecord) return; // 防止重复点击

        // 先取消所有现有编辑态
        renderDayDetailContent();

        isAddingNewRecord = true;

        // 在列表末尾创建一条编辑态的空记录
        var itemDiv = document.createElement("div");
        itemDiv.className = "day-record-item";
        itemDiv.setAttribute("data-editing", "true");
        itemDiv.setAttribute("data-is-new", "true");

        var editRow = document.createElement("div");
        editRow.className = "day-record-edit-row";

        // 日期（只读）
        var dateLabel = document.createElement("span");
        dateLabel.className = "day-record-edit-date-label";
        dateLabel.textContent = currentDayDetailDate;

        // 时间（默认当前时间）
        var now = new Date();
        var defaultTime = now.getHours().toString().padStart(2, "0") + ":" + now.getMinutes().toString().padStart(2, "0");

        var timeInput = document.createElement("input");
        timeInput.type = "time";
        timeInput.className = "day-record-edit-input time-input";
        timeInput.value = defaultTime;
        timeInput.setAttribute("placeholder", "请选择时间");

        // 金额输入框（空）
        var amountEditInput = document.createElement("input");
        amountEditInput.type = "text";
        amountEditInput.inputMode = "decimal";
        amountEditInput.className = "day-record-edit-input";
        amountEditInput.placeholder = "金额";
        amountEditInput.addEventListener("input", function () {
          var val = this.value.replace(/[^0-9.]/g, "");
          var dotIdx = val.indexOf(".");
          if (dotIdx !== -1) {
            val = val.substring(0, dotIdx + 1) + val.substring(dotIdx + 1).replace(/\./g, "");
            if (val.substring(dotIdx + 1).length > 2) {
              val = val.substring(0, dotIdx + 3);
            }
          }
          this.value = val;
        });

        // 备注输入框（空）
        var noteEditInput = document.createElement("input");
        noteEditInput.type = "text";
        noteEditInput.className = "day-record-edit-input note-input";
        noteEditInput.placeholder = "备注";

        // 保存按钮
        var saveBtn = document.createElement("button");
        saveBtn.className = "day-record-edit-save";
        saveBtn.textContent = "✓";
        saveBtn.title = "保存";
        saveBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          saveNewRecord(timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim());
        });

        // 取消按钮
        var cancelBtn = document.createElement("button");
        cancelBtn.className = "day-record-edit-cancel";
        cancelBtn.textContent = "✕";
        cancelBtn.title = "取消";
        cancelBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          // 取消新增：直接重新渲染，不留任何痕迹
          isAddingNewRecord = false;
          renderDayDetailContent();
        });

        editRow.appendChild(dateLabel);
        editRow.appendChild(timeInput);
        editRow.appendChild(amountEditInput);
        editRow.appendChild(noteEditInput);
        editRow.appendChild(saveBtn);
        editRow.appendChild(cancelBtn);

        itemDiv.appendChild(editRow);
        dayDetailListEl.appendChild(itemDiv);

        // 自动聚焦金额输入框
        setTimeout(function () { amountEditInput.focus(); }, 50);

        // Enter 保存
        timeInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveNewRecord(timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
        amountEditInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveNewRecord(timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });
        noteEditInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveNewRecord(timeInput.value.trim(), amountEditInput.value.trim(), noteEditInput.value.trim()); }
        });

        // 滚动到底部
        dayDetailListEl.scrollTop = dayDetailListEl.scrollHeight;
      }

      // ---------- 保存新记录 ----------
      function saveNewRecord(newTimeStr, newAmountStr, newNoteStr) {
        // 校验时间不能为空
        if (newTimeStr === "") {
          alert("请选择时间");
          return;
        }

        var newAmount = parseFloat(newAmountStr);
        if (isNaN(newAmount) || newAmount <= 0) return;

        var history = loadHistory();

        // 格式化时间为 HH:MM:SS
        var formattedTime = newTimeStr.length === 5 ? newTimeStr + ":00" : newTimeStr;

        var newRecord = {
          amount: newAmount,
          note: newNoteStr !== "" ? newNoteStr : "未备注",
          time: formattedTime,
          date: currentDayDetailDate
        };

        history.push(newRecord);
        saveHistory(history);

        isAddingNewRecord = false;
        refreshAll();
      }

      // ---------- 关闭日明细浮层 ----------
      function closeDayDetail() {
        dayDetailOverlay.classList.add("hidden");
        currentDayDetailDate = null;
        isAddingNewRecord = false;
      }

      // ---------- 月份面板：打开 ----------
      function openMonthPanel() {
        var available = getAvailableMonths();
        var currentYM = currentYear + "-" + currentMonth.toString().padStart(2, "0");

        monthPanelList.innerHTML = "";
        if (available.length === 0) {
          var emptyDiv = document.createElement("div");
          emptyDiv.className = "month-panel-item";
          emptyDiv.textContent = "暂无记录";
          emptyDiv.style.color = "#b0b0b0";
          emptyDiv.style.cursor = "default";
          monthPanelList.appendChild(emptyDiv);
        } else {
          for (var i = 0; i < available.length; i++) {
            var ym = available[i];
            var parts = ym.split("-");
            var y = parseInt(parts[0], 10);
            var m = parseInt(parts[1], 10);
            var label = y + "年" + m + "月";

            var itemDiv = document.createElement("div");
            itemDiv.className = "month-panel-item";
            if (ym === currentYM) {
              itemDiv.classList.add("active");
            }
            itemDiv.textContent = label;
            (function (year, month) {
              itemDiv.addEventListener("click", function () {
                selectMonth(year, month);
              });
            })(y, m);
            monthPanelList.appendChild(itemDiv);
          }
        }

        monthPanelOverlay.classList.remove("hidden");
      }

      // ---------- 月份面板：关闭 ----------
      function closeMonthPanel() {
        monthPanelOverlay.classList.add("hidden");
      }

      // ---------- 月份面板：选择月份 ----------
      function selectMonth(year, month) {
        currentYear = year;
        currentMonth = month;
        collapseDailyDetail();
        renderAll();
        closeMonthPanel();
      }

      // ---------- 渲染全部 ----------
      function renderAll() {
        updateMonthLabel();
        updateStatsCards();
        updateChart();
        renderDailyDetail();
      }

      // ---------- 初始化：默认显示当前月 ----------
      function init() {
        var today = new Date();
        currentYear = today.getFullYear();
        currentMonth = today.getMonth() + 1;
        renderAll();
      }

      // ---------- 事件绑定 ----------
      prevMonthBtn.addEventListener("click", goToPrevMonth);
      nextMonthBtn.addEventListener("click", goToNextMonth);

      // 月份标签点击打开面板
      monthLabel.addEventListener("click", openMonthPanel);

      // 点击面板遮罩关闭
      monthPanelOverlay.addEventListener("click", function (e) {
        if (e.target === monthPanelOverlay) {
          closeMonthPanel();
        }
      });

      // 每日明细摘要点击切换
      dailyDetailSummary.addEventListener("click", toggleDailyDetail);

      // 日明细浮层关闭
      dayDetailCloseBtn.addEventListener("click", closeDayDetail);
      dayDetailOverlay.addEventListener("click", function (e) {
        if (e.target === dayDetailOverlay) {
          closeDayDetail();
        }
      });

      // "+ 记一笔"按钮
      dayDetailAddBtn.addEventListener("click", function () {
        if (!currentDayDetailDate) return;
        startAddRecord();
      });

      // ---------- 启动 ----------
      init();
    })();
  </script>

</body>
</html>
