<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>极简记账本 V1.5.1</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    :root {
      --bg: #ffffff;
      --text: #2c2c2c;
      --text-light: #666666;
      --accent: #FF8C42;
      --accent-hover: #e67830;
      --accent-active: #cc6a28;
      --clear: #d0d0d0;
      --clear-hover: #b8b8b8;
      --clear-text: #555555;
      --input-border: #d5d5d5;
      --input-focus: #FF8C42;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial,
        sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 40px 28px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ---------- 标题 ---------- */
    .title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.05em;
    }

    /* ---------- 总支出显示区 ---------- */
    .display-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 32px 40px;
      border-radius: var(--radius);
      background: #fafafa;
      box-shadow: var(--shadow);
      width: 100%;
      transition: transform 0.15s ease;
    }

    .display-label {
      font-size: 0.95rem;
      color: var(--text-light);
      font-weight: 500;
    }

    .display-amount {
      font-size: 3.8rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.02em;
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
        color 0.18s ease;
      transform-origin: center center;
    }

    .display-unit {
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--text-light);
      margin-left: 4px;
      display: inline-block;
      vertical-align: baseline;
    }

    /* 弹跳动画 */
    .bounce {
      animation: bounceIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes bounceIn {
      0% {
        transform: scale(1);
      }
      35% {
        transform: scale(1.18);
        color: var(--accent);
      }
      100% {
        transform: scale(1);
      }
    }

    .reset-flash {
      animation: resetFlash 0.28s ease;
    }

    @keyframes resetFlash {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(0.92);
        color: #999;
      }
      100% {
        transform: scale(1);
      }
    }

    /* ---------- 预算行 ---------- */
    .budget-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .budget-remaining {
      font-size: 0.9rem;
      color: var(--text-light);
      font-weight: 500;
    }

    .budget-remaining.over-budget {
      color: #e04848;
      font-weight: 600;
    }

    .budget-set-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, color 0.15s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .budget-set-btn:hover {
      background: #d5d5d5;
      color: #555;
    }

    .budget-set-btn:active {
      transform: scale(0.92);
    }

    /* ---------- 历史按钮 ---------- */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    .history-btn {
      font-size: 0.85rem;
      color: var(--text-light);
      background: #f5f5f5;
      border: 1px solid #dcdcdc;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .history-btn:hover {
      background: #ebebeb;
    }

    .history-btn:active {
      transform: scale(0.95);
    }

    /* ---------- 历史记录弹窗 ---------- */
    .history-modal-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 380px;
      max-width: 92vw;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .history-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .history-modal-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .history-modal-close {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .history-modal-close:hover {
      background: #d5d5d5;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-empty {
      text-align: center;
      color: #b0b0b0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #fafafa;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .history-item-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .history-item-amount {
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .history-item-note {
      color: var(--text-light);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-item-time {
      color: #b0b0b0;
      font-size: 0.8rem;
      white-space: nowrap;
      margin-left: 10px;
    }

    /* ---------- 预算弹窗 ---------- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.18s ease;
    }

    .modal-overlay.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px 24px 24px;
      width: 300px;
      max-width: 90vw;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .modal-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
    }

    .modal-input {
      width: 100%;
      height: 44px;
      border: 2px solid var(--input-border);
      border-radius: var(--radius);
      padding: 0 14px;
      font-size: 1.1rem;
      text-align: center;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s ease;
    }

    .modal-input:focus {
      border-color: var(--accent);
    }

    .modal-btns {
      display: flex;
      gap: 10px;
    }

    .modal-btn {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .modal-btn-cancel {
      background: #e8e8e8;
      color: #666;
    }

    .modal-btn-cancel:hover {
      background: #d5d5d5;
    }

    .modal-btn-confirm {
      background: var(--accent);
      color: #fff;
    }

    .modal-btn-confirm:hover {
      background: var(--accent-hover);
    }

    /* ---------- 输入区 ---------- */
    .input-wrapper {
      width: 100%;
    }

    .amount-input {
      width: 100%;
      height: 52px;
      border: 2px solid var(--input-border);
      border-radius: var(--radius);
      padding: 0 16px;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      outline: none;
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-appearance: none;
      -moz-appearance: textfield;
    }

    .amount-input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(255, 140, 66, 0.15);
    }

    .amount-input::placeholder {
      color: #c0c0c0;
      font-weight: 400;
      font-size: 1rem;
    }

    /* 隐藏 number 输入框的上下箭头 */
    .amount-input::-webkit-inner-spin-button,
    .amount-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* ---------- 按钮区 ---------- */
    .button-group {
      display: flex;
      gap: 14px;
      width: 100%;
    }

    .btn {
      flex: 1;
      height: 50px;
      border: none;
      border-radius: var(--radius);
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.18s ease, transform 0.1s ease,
        box-shadow 0.18s ease;
      letter-spacing: 0.03em;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background-color: var(--accent);
      color: #fff;
      box-shadow: 0 3px 10px rgba(255, 140, 66, 0.3);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-primary:active {
      background-color: var(--accent-active);
      box-shadow: 0 1px 4px rgba(255, 140, 66, 0.3);
    }

    .btn-secondary {
      background-color: var(--clear);
      color: var(--clear-text);
    }

    .btn-secondary:hover {
      background-color: var(--clear-hover);
    }

    /* ---------- 底部提示 ---------- */
    .hint {
      font-size: 0.78rem;
      color: #b0b0b0;
      text-align: center;
      line-height: 1.6;
    }

    /* ========== 移动端优化 ========== */
    @media (max-width: 480px) {
      .container {
        padding: 28px 18px 36px;
        gap: 24px;
      }

      .display-area {
        padding: 24px 20px;
      }

      .display-amount {
        font-size: 3.2rem;
      }

      .amount-input {
        height: 48px;
        font-size: 1.1rem;
      }

      .btn {
        height: 48px;
        font-size: 1.05rem;
      }
    }

    @media (max-width: 360px) {
      .display-amount {
        font-size: 2.6rem;
      }

      .button-group {
        gap: 10px;
      }

      .btn {
        height: 44px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 标题 -->
    <div class="header-row">
      <h1 class="title">极简记账本</h1>
      <button class="history-btn" id="historyBtn">📋 历史</button>
    </div>

    <!-- 今日支出显示 -->
    <div class="display-area" id="displayArea">
      <span class="display-label">今日支出</span>
      <div>
        <span class="display-amount" id="totalAmount">0</span>
        <span class="display-unit">元</span>
      </div>
      <div class="budget-row">
        <span class="budget-remaining" id="budgetRemaining">今日预算剩余：--元</span>
        <button class="budget-set-btn" id="budgetSetBtn" title="设置预算">⚙</button>
      </div>
    </div>

    <!-- 金额输入 -->
    <div class="input-wrapper">
      <input
        type="text"
        class="amount-input"
        id="amountInput"
        placeholder="输入消费金额"
        inputmode="decimal"
        autocomplete="off"
      >
    </div>

    <!-- 备注输入 -->
    <div class="input-wrapper">
      <input
        type="text"
        class="amount-input"
        id="noteInput"
        placeholder="买了什么（可选）"
        autocomplete="off"
      >
    </div>

    <!-- 按钮组 -->
    <div class="button-group">
      <button class="btn btn-primary" id="addBtn">记一笔</button>
      <button class="btn btn-secondary" id="undoBtn">撤销</button>
      <button class="btn btn-secondary" id="resetBtn">清零</button>
    </div>

    <!-- 预算设置弹窗 -->
    <div class="modal-overlay hidden" id="budgetModal">
      <div class="modal-box">
        <div class="modal-title">设置今日预算</div>
        <input
          type="text"
          class="modal-input"
          id="budgetInput"
          placeholder="输入预算金额"
          inputmode="decimal"
          autocomplete="off"
        >
        <div class="modal-btns">
          <button class="modal-btn modal-btn-cancel" id="budgetCancelBtn">取消</button>
          <button class="modal-btn modal-btn-confirm" id="budgetConfirmBtn">确定</button>
        </div>
      </div>
    </div>

    <!-- 历史记录弹窗 -->
    <div class="modal-overlay hidden" id="historyModal">
      <div class="history-modal-box">
        <div class="history-modal-header">
          <span class="history-modal-title">今日记录</span>
          <button class="history-modal-close" id="historyCloseBtn">✕</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">今日暂无记录</div>
        </div>
      </div>
    </div>

  <!-- 提示 -->
    <p class="hint">数据自动保存到浏览器 · 刷新/关闭后记录不丢失 · 按回车快速记账 · 支持离线使用</p>
  </div>

  <!-- Service Worker 注册 -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").then(function (registration) {
          console.log(
            "[极简记账本] Service Worker 注册成功，scope:",
            registration.scope
          );
        }).catch(function (err) {
          console.error("[极简记账本] Service Worker 注册失败:", err);
        });
      });
    }
  </script>

  <script>
    (function () {
      // ---------- DOM 元素 ----------
      const totalAmountEl = document.getElementById("totalAmount");
      const displayAreaEl = document.getElementById("displayArea");
      const budgetRemainingEl = document.getElementById("budgetRemaining");
      const budgetSetBtn = document.getElementById("budgetSetBtn");
      const budgetModal = document.getElementById("budgetModal");
      const budgetInput = document.getElementById("budgetInput");
      const budgetCancelBtn = document.getElementById("budgetCancelBtn");
      const budgetConfirmBtn = document.getElementById("budgetConfirmBtn");
      const noteInput = document.getElementById("noteInput");
      const amountInput = document.getElementById("amountInput");
      const addBtn = document.getElementById("addBtn");
      const undoBtn = document.getElementById("undoBtn");
      const resetBtn = document.getElementById("resetBtn");
      const historyBtn = document.getElementById("historyBtn");
      const historyModal = document.getElementById("historyModal");
      const historyList = document.getElementById("historyList");
      const historyCloseBtn = document.getElementById("historyCloseBtn");

      // ---------- localStorage key ----------
      const STORAGE_KEY = "minimal_ledger_total";
      const HISTORY_KEY = "minimal_ledger_history";
      const BUDGET_KEY = "minimal_ledger_budget";

      // ---------- 状态 ----------
      let total = 0;
      // 每条记录：{ amount: 数字, note: 字符串, time: "HH:MM:SS" }
      let history = [];
      let budget = null;      // null 表示未设置

      // ---------- 获取当前时间字符串 ----------
      function getTimeString() {
        var now = new Date();
        var h = now.getHours().toString().padStart(2, "0");
        var m = now.getMinutes().toString().padStart(2, "0");
        var s = now.getSeconds().toString().padStart(2, "0");
        return h + ":" + m + ":" + s;
      }

      // ---------- 从 localStorage 读取初始值 ----------
      function loadFromStorage() {
        var stored = localStorage.getItem(STORAGE_KEY);
        if (stored !== null) {
          var num = parseFloat(stored);
          if (!isNaN(num) && num >= 0) {
            total = num;
          }
        }
        // 读取历史记录
        var storedHistory = localStorage.getItem(HISTORY_KEY);
        if (storedHistory !== null) {
          try {
            var parsed = JSON.parse(storedHistory);
            if (Array.isArray(parsed)) {
              // 自动迁移旧格式（纯数字数组 -> 对象数组）
              history = parsed.map(function (v) {
                if (typeof v === "number") {
                  return { amount: v, note: "未备注", time: "--:--" };
                }
                if (v && typeof v.amount === "number") {
                  return v;
                }
                return null;
              }).filter(function (v) { return v !== null; });
            }
          } catch (e) {
            history = [];
          }
        }
        // 读取预算
        var storedBudget = localStorage.getItem(BUDGET_KEY);
        if (storedBudget !== null) {
          var num = parseFloat(storedBudget);
          if (!isNaN(num) && num > 0) {
            budget = num;
          }
        }
      }

      // ---------- 保存到 localStorage ----------
      function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, formatAmount(total));
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      }

      // ---------- 格式化金额：保留两位小数，去掉末尾多余的零 ----------
      function formatAmount(value) {
        return parseFloat(value.toFixed(2));
      }

      // ---------- 更新显示 ----------
      function updateDisplay() {
        totalAmountEl.textContent = formatAmount(total);
        updateBudgetDisplay();
      }

      // ---------- 更新预算显示 ----------
      function updateBudgetDisplay() {
        if (budget === null) {
          budgetRemainingEl.textContent = "今日预算剩余：--元";
          budgetRemainingEl.classList.remove("over-budget");
        } else {
          var remaining = budget - total;
          remaining = parseFloat(remaining.toFixed(2));
          budgetRemainingEl.textContent = "今日预算剩余：" + remaining + "元";
          if (remaining < 0) {
            budgetRemainingEl.classList.add("over-budget");
          } else {
            budgetRemainingEl.classList.remove("over-budget");
          }
        }
      }

      // ---------- 触发弹跳动画 ----------
      function triggerBounceAnimation(className) {
        totalAmountEl.classList.remove("bounce", "reset-flash");
        // 强制回流以重新触发动画
        void totalAmountEl.offsetWidth;
        totalAmountEl.classList.add(className);
      }

      // ---------- 记一笔 ----------
      function addRecord() {
        var rawValue = amountInput.value.trim();

        // 空值或无意义输入 -> 无反应
        if (rawValue === "") return;

        var num = parseFloat(rawValue);

        // 非数字、NaN、<= 0 -> 无反应
        if (isNaN(num) || num <= 0) return;

        var noteRaw = noteInput.value.trim();
        var noteText = noteRaw !== "" ? noteRaw : "未备注";
        var timeStr = getTimeString();

        // 累加
        total += num;
        // 记录到历史栈（对象格式）
        history.push({ amount: num, note: noteText, time: timeStr });
        saveToStorage();
        updateDisplay();
        triggerBounceAnimation("bounce");

        // 清空输入框
        amountInput.value = "";
        noteInput.value = "";
        amountInput.focus();
      }

      // ---------- 撤销上一笔 ----------
      function undoLast() {
        if (history.length === 0) return; // 无记录可撤销
        var lastRecord = history.pop();
        total -= lastRecord.amount;
        total = parseFloat(total.toFixed(2));
        saveToStorage();
        updateDisplay();
        triggerBounceAnimation("reset-flash");
      }

      // ---------- 清零 ----------
      function resetTotal() {
        if (total === 0) return; // 已经是 0 无需操作
        total = 0;
        history = [];
        saveToStorage();
        updateDisplay();
        triggerBounceAnimation("reset-flash");
      }

      // ---------- 输入过滤：实时过滤非数字字符 ----------
      amountInput.addEventListener("input", function () {
        // 移除负号、字母等非法字符（保留数字、小数点）
        // 输入框为 type="text"，此过滤作为主要防线
        let val = this.value;
        // 只允许数字和一个小数点
        val = val.replace(/[^0-9.]/g, "");
        // 只保留第一个小数点
        const dotIndex = val.indexOf(".");
        if (dotIndex !== -1) {
          val =
            val.substring(0, dotIndex + 1) +
            val.substring(dotIndex + 1).replace(/\./g, "");
        }
        // 限制小数点后最多两位
        if (dotIndex !== -1) {
          const decimalPart = val.substring(dotIndex + 1);
          if (decimalPart.length > 2) {
            val = val.substring(0, dotIndex + 3);
          }
        }
        this.value = val;
      });

      // 阻止输入框内粘贴非数字内容后再做过滤
      amountInput.addEventListener("paste", function (e) {
        const pastedData = (e.clipboardData || window.clipboardData)
          .getData("text");
        if (pastedData && !/^[\d.]+$/.test(pastedData)) {
          // 尝试从中提取数字
          const cleaned = pastedData.replace(/[^0-9.]/g, "");
          const dotIdx = cleaned.indexOf(".");
          let final = cleaned;
          if (dotIdx !== -1) {
            final =
              cleaned.substring(0, dotIdx + 1) +
              cleaned.substring(dotIdx + 1).replace(/\./g, "");
          }
          e.preventDefault();
          this.value = final;
          // 触发 input 事件以进行二次过滤
          this.dispatchEvent(new Event("input", { bubbles: true }));
        }
      });

      // ---------- 预算弹窗：打开 ----------
      function openBudgetModal() {
        budgetInput.value = budget !== null ? budget : "";
        budgetModal.classList.remove("hidden");
        setTimeout(function () { budgetInput.focus(); }, 100);
      }

      // ---------- 预算弹窗：关闭 ----------
      function closeBudgetModal() {
        budgetModal.classList.add("hidden");
      }

      // ---------- 预算弹窗：确认设置 ----------
      function confirmBudget() {
        var rawValue = budgetInput.value.trim();
        if (rawValue === "") {
          // 空字符串 -> 清空预算
          budget = null;
          localStorage.removeItem(BUDGET_KEY);
        } else {
          var num = parseFloat(rawValue);
          if (isNaN(num) || num < 0) return; // 非数字或负数 -> 无反应
          if (num === 0) {
            // 输入 0 等同于未设置
            budget = null;
            localStorage.removeItem(BUDGET_KEY);
          } else {
            budget = num;
            localStorage.setItem(BUDGET_KEY, budget);
          }
        }
        updateBudgetDisplay();
        closeBudgetModal();
      }

      // ---------- 历史弹窗：打开 ----------
      function openHistoryModal() {
        renderHistoryList();
        historyModal.classList.remove("hidden");
      }

      // ---------- 历史弹窗：关闭 ----------
      function closeHistoryModal() {
        historyModal.classList.add("hidden");
      }

      // ---------- 渲染历史列表 ----------
      function renderHistoryList() {
        historyList.innerHTML = "";
        if (history.length === 0) {
          var emptyDiv = document.createElement("div");
          emptyDiv.className = "history-empty";
          emptyDiv.textContent = "今日暂无记录";
          historyList.appendChild(emptyDiv);
          return;
        }
        // 时间倒序（最新记录在上）
        var reversed = history.slice().reverse();
        for (var i = 0; i < reversed.length; i++) {
          var record = reversed[i];
          var itemDiv = document.createElement("div");
          itemDiv.className = "history-item";

          var leftDiv = document.createElement("div");
          leftDiv.className = "history-item-left";

          var amountSpan = document.createElement("span");
          amountSpan.className = "history-item-amount";
          amountSpan.textContent = "+" + formatAmount(record.amount) + "元";

          var noteSpan = document.createElement("span");
          noteSpan.className = "history-item-note";
          noteSpan.textContent = record.note;

          leftDiv.appendChild(amountSpan);
          leftDiv.appendChild(noteSpan);

          var timeSpan = document.createElement("span");
          timeSpan.className = "history-item-time";
          timeSpan.textContent = record.time;

          itemDiv.appendChild(leftDiv);
          itemDiv.appendChild(timeSpan);
          historyList.appendChild(itemDiv);
        }
      }

      // ---------- 按钮事件 ----------
      addBtn.addEventListener("click", addRecord);
      undoBtn.addEventListener("click", undoLast);
      resetBtn.addEventListener("click", resetTotal);
      budgetSetBtn.addEventListener("click", openBudgetModal);
      budgetCancelBtn.addEventListener("click", closeBudgetModal);
      budgetConfirmBtn.addEventListener("click", confirmBudget);
      historyBtn.addEventListener("click", openHistoryModal);
      historyCloseBtn.addEventListener("click", closeHistoryModal);

      // 点击遮罩关闭弹窗
      budgetModal.addEventListener("click", function (e) {
        if (e.target === budgetModal) {
          closeBudgetModal();
        }
      });

      // 点击遮罩关闭历史弹窗
      historyModal.addEventListener("click", function (e) {
        if (e.target === historyModal) {
          closeHistoryModal();
        }
      });

      // 预算弹窗内 Enter 键确认
      budgetInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          confirmBudget();
        }
      });

      // ---------- 键盘支持：Enter 键记一笔 ----------
      amountInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          addRecord();
        }
      });

      // 备注输入框也支持 Enter 键快速记账
      noteInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          addRecord();
        }
      });

      // ---------- 页面初始化：读取存储并显示 ----------
      loadFromStorage();
      updateDisplay();

      // ---------- 阻止移动端双击缩放（在 display-area 上） ----------
      displayAreaEl.addEventListener(
        "dblclick",
        function (e) {
          e.preventDefault();
        },
        { passive: false }
      );
    })();
  </script>

</body>
</html>
