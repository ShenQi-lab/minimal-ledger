<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>极简记账本 V1.10.1</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FF8C42'/><text y='.9em' font-size='90' text-anchor='middle' fill='white'>💰</text></svg>">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --text: #2c2c2c;
      --text-light: #666666;
      --accent: #FF8C42;
      --accent-hover: #e67830;
      --accent-active: #cc6a28;
      --clear: #d0d0d0;
      --clear-hover: #b8b8b8;
      --clear-text: #555555;
      --input-border: #d5d5d5;
      --input-focus: #FF8C42;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial,
        sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 64px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .page {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ---------- 标题 ---------- */
    .title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.05em;
    }

    /* ---------- 登录区 ---------- */
    .auth-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .auth-area.hidden {
      display: none;
    }

    .auth-form.hidden {
      display: none;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .auth-input {
      width: 100%;
      height: 40px;
      border: 2px solid var(--input-border);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
    }

    .auth-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 140, 66, 0.12);
    }

    .auth-btns {
      display: flex;
      gap: 8px;
    }

    .auth-btn {
      flex: 1;
      height: 38px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .auth-btn:active {
      transform: scale(0.96);
    }

    .auth-btn-login {
      background: var(--accent);
      color: #fff;
    }

    .auth-btn-login:hover {
      background: var(--accent-hover);
    }

    .auth-btn-register {
      background: #f0f0f0;
      color: var(--text-light);
    }

    .auth-btn-register:hover {
      background: #e0e0e0;
    }

    .auth-user-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 8px 14px;
      background: #fff8f3;
      border-radius: 8px;
      border: 1px solid #ffe0cc;
    }

    .auth-user-info.hidden {
      display: none;
    }

    .auth-user-email {
      font-size: 0.85rem;
      color: var(--text);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .auth-logout-btn {
      font-size: 0.8rem;
      color: #999;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .auth-logout-btn:hover {
      color: #e04848;
      background: #fff0f0;
    }

    .auth-loading {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-light);
      padding: 8px 0;
    }

    /* ---------- 总支出显示区 ---------- */
    .display-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 32px 40px;
      border-radius: var(--radius);
      background: #fafafa;
      box-shadow: var(--shadow);
      width: 100%;
      transition: transform 0.15s ease;
    }

    .display-label {
      font-size: 0.95rem;
      color: var(--text-light);
      font-weight: 500;
    }

    .display-amount {
      font-size: 3.8rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.02em;
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
        color 0.18s ease;
      transform-origin: center center;
    }

    .display-unit {
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--text-light);
      margin-left: 4px;
      display: inline-block;
      vertical-align: baseline;
    }

    /* 弹跳动画 */
    .bounce {
      animation: bounceIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes bounceIn {
      0% {
        transform: scale(1);
      }
      35% {
        transform: scale(1.18);
        color: var(--accent);
      }
      100% {
        transform: scale(1);
      }
    }

    .reset-flash {
      animation: resetFlash 0.28s ease;
    }

    @keyframes resetFlash {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(0.92);
        color: #999;
      }
      100% {
        transform: scale(1);
      }
    }

    /* ---------- 预算行 ---------- */
    .budget-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .budget-remaining {
      font-size: 0.9rem;
      color: var(--text-light);
      font-weight: 500;
    }

    .budget-remaining.over-budget {
      color: #e04848;
      font-weight: 600;
    }

    .budget-set-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, color 0.15s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .budget-set-btn:hover {
      background: #d5d5d5;
      color: #555;
    }

    .budget-set-btn:active {
      transform: scale(0.92);
    }

    /* ---------- 历史按钮 ---------- */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    .history-btn {
      font-size: 0.85rem;
      color: var(--text-light);
      background: #f5f5f5;
      border: 1px solid #dcdcdc;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .history-btn:hover {
      background: #ebebeb;
    }

    .history-btn:active {
      transform: scale(0.95);
    }

    /* ---------- 历史记录弹窗 ---------- */
    .history-modal-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 24px;
      width: 380px;
      max-width: 92vw;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .history-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .history-modal-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .history-modal-close {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
      flex-shrink: 0;
    }

    .history-modal-close:hover {
      background: #d5d5d5;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-empty {
      text-align: center;
      color: #b0b0b0;
      font-size: 0.95rem;
      padding: 32px 0;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #fafafa;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .history-item-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .history-item-amount {
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .history-item-note {
      color: var(--text-light);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-item-time {
      color: #b0b0b0;
      font-size: 0.8rem;
      white-space: nowrap;
      margin-left: 10px;
    }

    /* ---------- 预算弹窗 & 清零确认弹窗 ---------- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.18s ease;
    }

    .modal-overlay.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px 24px 24px;
      width: 300px;
      max-width: 90vw;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .modal-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
    }

    .modal-desc {
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-input {
      width: 100%;
      height: 44px;
      border: 2px solid var(--input-border);
      border-radius: var(--radius);
      padding: 0 14px;
      font-size: 1.1rem;
      text-align: center;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s ease;
    }

    .modal-input:focus {
      border-color: var(--accent);
    }

    .modal-btns {
      display: flex;
      gap: 10px;
    }

    .modal-btn {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .modal-btn-cancel {
      background: #e8e8e8;
      color: #666;
    }

    .modal-btn-cancel:hover {
      background: #d5d5d5;
    }

    .modal-btn-confirm {
      background: var(--accent);
      color: #fff;
    }

    .modal-btn-confirm:hover {
      background: var(--accent-hover);
    }

    .modal-btn-danger {
      background: #e04848;
      color: #fff;
    }

    .modal-btn-danger:hover {
      background: #c93a3a;
    }

    /* ---------- 历史记录操作按钮 ---------- */
    .history-item-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 6px;
      flex-shrink: 0;
    }

    .history-action-btn {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: transparent;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      color: #999;
    }

    .history-action-btn:hover {
      background: #e8e8e8;
      color: #555;
    }

    .history-action-btn:active {
      transform: scale(0.88);
      background: #ddd;
    }

    .history-action-btn.delete-btn:hover {
      background: #fee;
      color: #d44;
    }

    /* ---------- 历史记录编辑态 ---------- */
    .history-item-edit-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .history-edit-input {
      border: 1.5px solid var(--input-border);
      border-radius: 5px;
      padding: 3px 6px;
      font-size: 0.82rem;
      outline: none;
      width: 60px;
      text-align: center;
      transition: border-color 0.15s ease;
      -webkit-appearance: none;
    }

    .history-edit-input:focus {
      border-color: var(--accent);
    }

    .history-edit-input.note-input {
      flex: 1;
      min-width: 50px;
      text-align: left;
    }

    .history-edit-save {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .history-edit-save:hover {
      background: var(--accent-hover);
    }

    .history-edit-save:active {
      transform: scale(0.9);
    }

    .history-edit-cancel {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: #e8e8e8;
      color: #777;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .history-edit-cancel:hover {
      background: #d5d5d5;
    }

    /* ---------- 输入区 ---------- */
    .input-wrapper {
      width: 100%;
    }

    .amount-input {
      width: 100%;
      height: 52px;
      border: 2px solid var(--input-border);
      border-radius: var(--radius);
      padding: 0 16px;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      outline: none;
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-appearance: none;
      -moz-appearance: textfield;
    }

    .amount-input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(255, 140, 66, 0.15);
    }

    .amount-input::placeholder {
      color: #c0c0c0;
      font-weight: 400;
      font-size: 1rem;
    }

    /* 隐藏 number 输入框的上下箭头 */
    .amount-input::-webkit-inner-spin-button,
    .amount-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* ---------- 按钮区 ---------- */
    .button-group {
      display: flex;
      gap: 14px;
      width: 100%;
    }

    .btn-primary {
      flex: 2;
    }

    .btn-secondary {
      flex: 1;
    }

    .btn {
      flex: 1;
      height: 50px;
      border: none;
      border-radius: var(--radius);
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.18s ease, transform 0.1s ease,
        box-shadow 0.18s ease;
      letter-spacing: 0.03em;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background-color: var(--accent);
      color: #fff;
      box-shadow: 0 3px 10px rgba(255, 140, 66, 0.3);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-primary:active {
      background-color: var(--accent-active);
      box-shadow: 0 1px 4px rgba(255, 140, 66, 0.3);
    }

    .btn-secondary {
      background-color: var(--clear);
      color: var(--clear-text);
    }

    .btn-secondary:hover {
      background-color: var(--clear-hover);
    }

    /* ---------- 底部提示 ---------- */
    .hint {
      font-size: 0.78rem;
      color: #b0b0b0;
      text-align: center;
      line-height: 1.6;
    }

    /* ---------- 底部导航栏 ---------- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      height: 56px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 90;
      box-shadow: 0 -1px 6px rgba(0, 0, 0, 0.04);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      background: none;
      border: none;
      color: #b0b0b0;
      font-size: 0.7rem;
      padding: 4px 16px;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
    }

    .nav-item .nav-icon {
      font-size: 1.35rem;
      line-height: 1;
    }

    .nav-item.active {
      color: var(--accent);
      font-weight: 600;
    }

    /* ========== 移动端优化 ========== */
    @media (max-width: 480px) {
      .page {
        padding: 28px 18px 20px;
        gap: 24px;
      }

      .display-area {
        padding: 24px 20px;
      }

      .display-amount {
        font-size: 3.2rem;
      }

      .amount-input {
        height: 48px;
        font-size: 1.1rem;
      }

      .btn {
        height: 48px;
        font-size: 1.05rem;
      }
    }

    @media (max-width: 360px) {
      .display-amount {
        font-size: 2.6rem;
      }

      .button-group {
        gap: 10px;
      }

      .btn {
        height: 44px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="page" id="ledgerPage">
    <!-- 标题 -->
    <div class="header-row">
      <h1 class="title">极简记账本</h1>
      <button class="history-btn" id="historyBtn">📋 历史</button>
    </div>

    <!-- 登录/注册区域 -->
    <div class="auth-area" id="authArea">
      <!-- 未登录时的表单 -->
      <div class="auth-form" id="authForm">
        <input
          type="email"
          class="auth-input"
          id="authEmail"
          placeholder="邮箱"
          autocomplete="email"
        >
        <input
          type="password"
          class="auth-input"
          id="authPassword"
          placeholder="密码"
          autocomplete="current-password"
        >
        <div class="auth-btns">
          <button class="auth-btn auth-btn-login" id="loginBtn">登录</button>
          <button class="auth-btn auth-btn-register" id="registerBtn">注册</button>
        </div>
      </div>
      <!-- 已登录时显示 -->
      <div class="auth-user-info hidden" id="authUserInfo">
        <span class="auth-user-email" id="authUserEmail"></span>
        <button class="auth-logout-btn" id="logoutBtn">退出</button>
      </div>
      <!-- 加载中 -->
      <div class="auth-loading hidden" id="authLoading">检查登录状态…</div>
    </div>

    <!-- 今日支出显示 -->
    <div class="display-area" id="displayArea">
      <span class="display-label">今日支出</span>
      <div>
        <span class="display-amount" id="totalAmount">0</span>
        <span class="display-unit">元</span>
      </div>
      <div class="budget-row">
        <span class="budget-remaining" id="budgetRemaining">今日预算剩余：--元</span>
        <button class="budget-set-btn" id="budgetSetBtn" title="设置预算">⚙</button>
      </div>
    </div>

    <!-- 金额输入 -->
    <div class="input-wrapper">
      <input
        type="text"
        class="amount-input"
        id="amountInput"
        placeholder="输入消费金额"
        inputmode="decimal"
        autocomplete="off"
      >
    </div>

    <!-- 备注输入 -->
    <div class="input-wrapper">
      <input
        type="text"
        class="amount-input"
        id="noteInput"
        placeholder="买了什么（可选）"
        autocomplete="off"
      >
    </div>

    <!-- 按钮组 -->
    <div class="button-group">
      <button class="btn btn-primary" id="addBtn">记一笔</button>
      <button class="btn btn-secondary" id="undoBtn">撤销</button>
    </div>

    <!-- 预算设置弹窗 -->
    <div class="modal-overlay hidden" id="budgetModal">
      <div class="modal-box">

  <!-- Service Worker 注册 -->
  <script>
    if ("serviceWorker" in navigator) {
      var refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").then(function (registration) {
          console.log("[极简记账本] Service Worker 注册成功，scope:", registration.scope);
          if (registration.waiting) {
            registration.waiting.postMessage({ type: "SKIP_WAITING" });
          }
          registration.addEventListener("updatefound", function () {
            var newWorker = registration.installing;
            if (newWorker) {
              newWorker.addEventListener("statechange", function () {
                if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: "SKIP_WAITING" });
                }
              });
            }
          });
        }).catch(function (err) {
          console.error("[极简记账本] Service Worker 注册失败:", err);
        });
      });
    }
  </script>

  <script>
    // ========== Supabase 初始化 ==========
    (function () {
      // Supabase 配置
      var SUPABASE_URL = 'https://zmryiekgosgjipnsyayj.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptcnlpZWtnb3NnamlwbnN5YXlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjcyNzQsImV4cCI6MjA5MzkwMzI3NH0.HAnHiz5x1EzwPpVyS8Df270UKvHjkW7LwG5UJiBOEHo';
      var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      var currentUser = null;

      // 定义为全局可访问（供 stats.html 跨页面读取）
      window.__supabase = supabase;
      window.__currentUser = null;

      // ---------- DOM 元素 ----------
      var totalAmountEl = document.getElementById("totalAmount");
      var displayAreaEl = document.getElementById("displayArea");
      var budgetRemainingEl = document.getElementById("budgetRemaining");
      var budgetSetBtn = document.getElementById("budgetSetBtn");
      var budgetModal = document.getElementById("budgetModal");
      var budgetInput = document.getElementById("budgetInput");
      var budgetCancelBtn = document.getElementById("budgetCancelBtn");
      var budgetConfirmBtn = document.getElementById("budgetConfirmBtn");
      var noteInput = document.getElementById("noteInput");
      var amountInput = document.getElementById("amountInput");
      var addBtn = document.getElementById("addBtn");
      var undoBtn = document.getElementById("undoBtn");
      var historyBtn = document.getElementById("historyBtn");
      var historyModal = document.getElementById("historyModal");
      var historyList = document.getElementById("historyList");
      var historyCloseBtn = document.getElementById("historyCloseBtn");
      var undoConfirmModal = document.getElementById("undoConfirmModal");
      var undoCancelBtn = document.getElementById("undoCancelBtn");
      var undoConfirmBtn = document.getElementById("undoConfirmBtn");

      // 登录相关 DOM
      var authArea = document.getElementById("authArea");
      var authForm = document.getElementById("authForm");
      var authEmail = document.getElementById("authEmail");
      var authPassword = document.getElementById("authPassword");
      var loginBtn = document.getElementById("loginBtn");
      var registerBtn = document.getElementById("registerBtn");
      var authUserInfo = document.getElementById("authUserInfo");
      var authUserEmail = document.getElementById("authUserEmail");
      var logoutBtn = document.getElementById("logoutBtn");
      var authLoading = document.getElementById("authLoading");

      // ---------- localStorage key ----------
      var STORAGE_KEY = "minimal_ledger_total";
      var HISTORY_KEY = "minimal_ledger_history";
      var BUDGET_KEY = "minimal_ledger_budget";
      var LAST_DATE_KEY = "minimal_ledger_last_date";
      var MIGRATED_KEY = "minimal_ledger_migrated";

      // ---------- 状态 ----------
      var total = 0;
      var history = [];
      var budget = null;

      // ---------- 获取当前日期字符串 YYYY-MM-DD ----------
      function getDateString() {
        var now = new Date();
        var y = now.getFullYear();
        var m = (now.getMonth() + 1).toString().padStart(2, "0");
        var d = now.getDate().toString().padStart(2, "0");
        return y + "-" + m + "-" + d;
      }

      // ---------- 获取当前时间字符串 ----------
      function getTimeString() {
        var now = new Date();
        var h = now.getHours().toString().padStart(2, "0");
        var m = now.getMinutes().toString().padStart(2, "0");
        var s = now.getSeconds().toString().padStart(2, "0");
        return h + ":" + m + ":" + s;
      }

      // ---------- 是否为今天的记录 ----------
      function isTodayRecord(record) {
        return record.date === getDateString();
      }

      // ---------- 从 localStorage 读取初始值 ----------
      function loadFromStorage() {
        var storedLastDate = localStorage.getItem(LAST_DATE_KEY);
        var storedHistory = localStorage.getItem(HISTORY_KEY);
        if (storedHistory !== null) {
          try {
            var parsed = JSON.parse(storedHistory);
            if (Array.isArray(parsed)) {
              var migrationDate = storedLastDate !== null ? storedLastDate : getDateString();
              history = parsed.map(function (v) {
                if (typeof v === "number") {
                  return { amount: v, note: "未备注", time: "--:--", date: migrationDate };
                }
                if (v && typeof v.amount === "number") {
                  if (!v.date) { v.date = migrationDate; }
                  if (!v.note) { v.note = "未备注"; }
                  if (!v.time) { v.time = "--:--"; }
                  return v;
                }
                return null;
              }).filter(function (v) { return v !== null; });
            }
          } catch (e) {
            history = [];
          }
        }
        // 重算今日总支出
        total = 0;
        var today = getDateString();
        for (var i = 0; i < history.length; i++) {
          if (history[i].date === today) {
            total += history[i].amount;
          }
        }
        total = parseFloat(total.toFixed(2));
        // 跨天自动清零
        if (storedLastDate !== null && storedLastDate !== today) {
          localStorage.setItem(LAST_DATE_KEY, today);
          console.log("[跨天检测] 日期从 " + storedLastDate + " 变为 " + today + "，今日支出已归零，历史记录保留");
        } else if (storedLastDate === null) {
          localStorage.setItem(LAST_DATE_KEY, today);
          console.log("[跨天检测] 首次使用，初始化日期为 " + today);
        }
        // 读取预算
        var storedBudget = localStorage.getItem(BUDGET_KEY);
        if (storedBudget !== null) {
          var num = parseFloat(storedBudget);
          if (!isNaN(num) && num > 0) {
            budget = num;
          }
        }
      }

      // ---------- 保存到 localStorage ----------
      function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, formatAmount(total));
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        localStorage.setItem(LAST_DATE_KEY, getDateString());
      }

      // ---------- 格式化金额：保留两位小数，去掉末尾多余的零 ----------
      function formatAmount(value) {
        return parseFloat(value.toFixed(2));
      }

      // ========== Supabase 数据读写 ==========

      // ---------- 从 Supabase 读取当前用户的所有记录 ----------
      async function loadFromSupabase() {
        if (!currentUser) return [];
        try {
          var { data, error } = await supabase
            .from('records')
            .select('id, amount, note, date, time')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: true });
          if (error) throw error;
          if (!data || data.length === 0) return [];
          return data.map(function (r) {
            return {
              _dbId: r.id,
              amount: parseFloat(r.amount),
              note: r.note || '未备注',
              date: r.date,
              time: r.time || '--:--'
            };
          });
        } catch (err) {
          console.error("[Supabase] 读取数据失败，回退 localStorage:", err.message);
          return null; // null 表示读取失败
        }
      }

      // ---------- 单条记录插入 Supabase ----------
      async function saveToSupabase(record) {
        if (!currentUser) return;
        try {
          var { data, error } = await supabase
            .from('records')
            .insert([{
              user_id: currentUser.id,
              amount: record.amount,
              note: record.note,
              date: record.date,
              time: record.time
            }])
            .select('id')
            .single();
          if (error) throw error;
          // 返回 Supabase 生成的 id，保存到本地记录中用于后续更新/删除
          return data ? (data.id || (Array.isArray(data) && data[0] && data[0].id)) : null;
        } catch (err) {
          console.error("[Supabase] 保存失败，静默降级:", err.message);
          return null;
        }
      }

      // ---------- 按 id 更新单条记录 ----------
      async function updateRecordInSupabase(dbId, updatedData) {
        if (!currentUser || !dbId) return;
        try {
          var { error } = await supabase
            .from('records')
            .update({
              amount: updatedData.amount,
              note: updatedData.note,
              date: updatedData.date,
              time: updatedData.time
            })
            .eq('id', dbId);
          if (error) throw error;
        } catch (err) {
          console.error("[Supabase] 更新失败，静默降级:", err.message);
        }
      }

      // ---------- 按 id 删除单条记录 ----------
      async function deleteRecordFromSupabase(dbId) {
        if (!currentUser || !dbId) return;
        try {
          var { error } = await supabase
            .from('records')
            .delete()
            .eq('id', dbId);
          if (error) throw error;
        } catch (err) {
          console.error("[Supabase] 删除失败，静默降级:", err.message);
        }
      }

      // ========== 认证功能 ==========

      // ---------- 更新登录 UI ----------
      function updateAuthUI() {
        if (currentUser) {
          authForm.classList.add("hidden");
          authUserInfo.classList.remove("hidden");
          authLoading.classList.add("hidden");  // ← 确保加载文字隐藏
          authUserEmail.textContent = currentUser.email;
          window.__currentUser = currentUser;
        } else {
          authForm.classList.remove("hidden");
          authUserInfo.classList.add("hidden");
          authLoading.classList.add("hidden");  // ← 确保加载文字隐藏
          window.__currentUser = null;
        }
      }

      // ---------- 登录 ----------
      async function handleLogin() {
        var email = authEmail.value.trim();
        var password = authPassword.value.trim();
        if (!email || !password) {
          alert("请输入邮箱和密码");
          return;
        }
        loginBtn.disabled = true;
        registerBtn.disabled = true;
        loginBtn.textContent = "登录中…";
        try {
          var { data, error } = await supabase.auth.signInWithPassword({ email: email, password: password });
          if (error) throw error;
          if (data && data.user) {
            currentUser = data.user;
            updateAuthUI();
            authPassword.value = "";
            await afterLoginInit();
          }
        } catch (err) {
          alert("登录失败: " + err.message);
        } finally {
          loginBtn.disabled = false;
          registerBtn.disabled = false;
          loginBtn.textContent = "登录";
        }
      }

      // ---------- 注册 ----------
      async function handleRegister() {
        var email = authEmail.value.trim();
        var password = authPassword.value.trim();
        if (!email || !password) {
          alert("请输入邮箱和密码");
          return;
        }
        if (password.length < 6) {
          alert("密码至少 6 位");
          return;
        }
        loginBtn.disabled = true;
        registerBtn.disabled = true;
        registerBtn.textContent = "注册中…";
        try {
          var { data, error } = await supabase.auth.signUp({ email: email, password: password });
          if (error) throw error;
          if (data && data.user) {
            // 部分情况下注册后自动登录
            if (data.session) {
              currentUser = data.user;
              updateAuthUI();
              authPassword.value = "";
              await afterLoginInit();
            } else {
              alert("注册成功！请检查邮箱确认（部分邮箱需验证），然后在此登录。");
            }
          } else {
            alert("注册成功！请在此登录。");
          }
        } catch (err) {
          alert("注册失败: " + err.message);
        } finally {
          loginBtn.disabled = false;
          registerBtn.disabled = false;
          registerBtn.textContent = "注册";
        }
      }

      // ---------- 退出 ----------
      async function handleLogout() {
        await supabase.auth.signOut();
        currentUser = null;
        window.__currentUser = null;
        updateAuthUI();
        // 退出后回退到 localStorage 模式，重新加载本地数据
        history = [];
        total = 0;
        loadFromStorage();
        updateDisplay();
        console.log("[认证] 已退出，回退到 localStorage 模式");
      }

      // ========== 数据迁移 ==========

      // ---------- 检查并执行数据迁移 ----------
      async function runMigration() {
        if (!currentUser) return;
        // 已迁移过
        if (localStorage.getItem(MIGRATED_KEY) === "true") {
          console.log("[迁移] 已迁移过，跳过");
          return;
        }
        // 检查本地是否有旧数据
        var storedHistory = localStorage.getItem(HISTORY_KEY);
        if (!storedHistory) {
          console.log("[迁移] 本地无旧数据，跳过");
          localStorage.setItem(MIGRATED_KEY, "true");
          return;
        }
        // 检查云端是否已有该用户的数据（多设备防重复）
        try {
          var { count, error } = await supabase
            .from('records')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', currentUser.id);
          if (error) throw error;
          if (count && count > 0) {
            console.log("[迁移] 云端已有 " + count + " 条数据，跳过迁移");
            localStorage.setItem(MIGRATED_KEY, "true");
            return;
          }
        } catch (err) {
          console.error("[迁移] 检查云端失败，跳过迁移:", err.message);
          return;
        }
        // 解析本地数据
        var localRecords = [];
        try {
          var parsed = JSON.parse(storedHistory);
          if (Array.isArray(parsed)) {
            localRecords = parsed.filter(function (v) {
              return v && typeof v.amount === "number";
            });
          }
        } catch (e) {
          localRecords = [];
        }
        if (localRecords.length === 0) {
          localStorage.setItem(MIGRATED_KEY, "true");
          return;
        }
        // 逐条插入 Supabase
        console.log("[迁移] 开始迁移 " + localRecords.length + " 条记录…");
        var successCount = 0;
        for (var i = 0; i < localRecords.length; i++) {
          try {
            var r = localRecords[i];
            var { error: insertErr } = await supabase
              .from('records')
              .insert([{
                user_id: currentUser.id,
                amount: parseFloat(r.amount),
                note: r.note || '未备注',
                date: r.date || getDateString(),
                time: r.time || '--:--'
              }]);
            if (!insertErr) successCount++;
          } catch (e) {
            console.error("[迁移] 单条插入失败:", e.message);
          }
        }
        localStorage.setItem(MIGRATED_KEY, "true");
        alert("数据迁移成功！共 " + successCount + " 条记录已同步到云端。");
        console.log("[迁移] 完成，成功 " + successCount + "/" + localRecords.length + " 条");
      }

      // ---------- 登录后初始化（加载云端数据 + 迁移 + 同步到 localStorage） ----------
      async function afterLoginInit() {
        try {
          // 先执行迁移
          await runMigration();
          // 从 Supabase 加载云端数据
          var cloudRecords = await loadFromSupabase();
          if (cloudRecords === null) {
            // 读取失败，回退到 localStorage
            console.log("[初始化] 云端加载失败，使用 localStorage 数据");
            loadFromStorage();
          } else if (cloudRecords.length > 0) {
            // 云端有数据：合并本地未同步的记录，防止覆盖丢失
            var localRecords = [];
            try {
              var stored = localStorage.getItem(HISTORY_KEY);
              if (stored) localRecords = JSON.parse(stored);
            } catch (e) {}
            
            // 找出本地有但云端没有的记录（未同步的）
            var merged = cloudRecords.slice();
            for (var i = 0; i < localRecords.length; i++) {
              var local = localRecords[i];
              // 本地记录没有 _dbId，说明还没同步到云端
              if (!local._dbId) {
                // 按时间+金额+备注匹配，避免重复
                var exists = false;
                for (var j = 0; j < merged.length; j++) {
                  if (merged[j].date === local.date && 
                      merged[j].time === local.time && 
                      merged[j].amount === local.amount &&
                      merged[j].note === local.note) {
                    exists = true;
                    break;
                  }
                }
                if (!exists) merged.push(local);
              }
            }
            
            history = merged;
            // 重算今日总支出
            total = 0;
            var today = getDateString();
            for (var i = 0; i < history.length; i++) {
              if (history[i].date === today) {
                total += history[i].amount;
              }
            }
            total = parseFloat(total.toFixed(2));
            // 同步到 localStorage 作为备份
            saveToStorage();
            console.log("[初始化] 合并完成，云端 " + cloudRecords.length + " 条 + 本地未同步 " + (merged.length - cloudRecords.length) + " 条");
          } else {
            // 云端无数据（迁移已处理或新用户），使用本地数据
            console.log("[初始化] 云端无数据，保留本地数据");
            loadFromStorage();
          }
        } catch (err) {
          console.error("[初始化] 加载云端数据异常，回退 localStorage:", err.message);
          loadFromStorage();
        }
        updateDisplay();
      }

      // ---------- 检查登录状态（页面初始化时） ----------
      async function checkSession() {
        authLoading.classList.remove("hidden");
        try {
          var { data, error } = await supabase.auth.getSession();
          if (error) throw error;
          if (data && data.session && data.session.user) {
            currentUser = data.session.user;
            updateAuthUI();
            await afterLoginInit();
          } else {
            currentUser = null;
            updateAuthUI();
            // 未登录：使用 localStorage
            loadFromStorage();
            updateDisplay();
          }
        } catch (err) {
          console.error("[认证] Session 检查失败:", err.message);
          currentUser = null;
          updateAuthUI();
          loadFromStorage();
          updateDisplay();
        } finally {
          authLoading.classList.add("hidden");
        }
      }

      // ---------- 更新显示 ----------
      function updateDisplay() {
        totalAmountEl.textContent = formatAmount(total);
        updateBudgetDisplay();
      }

      // ---------- 更新预算显示 ----------
      function updateBudgetDisplay() {
        if (budget === null) {
          budgetRemainingEl.textContent = "今日预算剩余：--元";
          budgetRemainingEl.classList.remove("over-budget");
        } else {
          var remaining = budget - total;
          remaining = parseFloat(remaining.toFixed(2));
          budgetRemainingEl.textContent = "今日预算剩余：" + remaining + "元";
          if (remaining < 0) {
            budgetRemainingEl.classList.add("over-budget");
          } else {
            budgetRemainingEl.classList.remove("over-budget");
          }
        }
      }

      // ---------- 触发弹跳动画 ----------
      function triggerBounceAnimation(className) {
        totalAmountEl.classList.remove("bounce", "reset-flash");
        void totalAmountEl.offsetWidth;
        totalAmountEl.classList.add(className);
      }

      // ---------- 记一笔 ----------
      async function addRecord() {
        var rawValue = amountInput.value.trim();
        if (rawValue === "") return;
        var num = parseFloat(rawValue);
        if (isNaN(num) || num <= 0) return;

        var noteRaw = noteInput.value.trim();
        var noteText = noteRaw !== "" ? noteRaw : "未备注";
        var timeStr = getTimeString();
        var dateStr = getDateString();

        // 累加
        total += num;
        // 记录到历史栈
        var record = { amount: num, note: noteText, time: timeStr, date: dateStr };
        history.push(record);
        // 保存到 localStorage
        saveToStorage();
        updateDisplay();
        triggerBounceAnimation("bounce");

        // 清空输入框
        amountInput.value = "";
        noteInput.value = "";
        amountInput.focus();

        // 同步到 Supabase（后台静默，不阻塞）
        if (currentUser) {
          var dbId = await saveToSupabase(record);
          if (dbId) {
            record._dbId = dbId;
            saveToStorage(); // 更新含 _dbId 的记录到 localStorage
          }
        }
      }

      // ---------- 撤销确认弹窗：打开 ----------
      function openUndoConfirmModal() {
        var hasToday = false;
        for (var i = history.length - 1; i >= 0; i--) {
          if (isTodayRecord(history[i])) { hasToday = true; break; }
        }
        if (!hasToday) return;
        undoConfirmModal.classList.remove("hidden");
      }

      // ---------- 撤销确认弹窗：关闭 ----------
      function closeUndoConfirmModal() {
        undoConfirmModal.classList.add("hidden");
      }

      // ---------- 确认撤销 ----------
      function confirmUndo() {
        closeUndoConfirmModal();
        undoLast();
      }

      // ---------- 撤销上一笔（仅限今日记录） ----------
      async function undoLast() {
        if (history.length === 0) return;
        for (var i = history.length - 1; i >= 0; i--) {
          if (isTodayRecord(history[i])) {
            var removed = history.splice(i, 1)[0];
            total -= removed.amount;
            total = parseFloat(total.toFixed(2));
            saveToStorage();
            updateDisplay();
            triggerBounceAnimation("reset-flash");
            // 同步删除 Supabase
            if (currentUser && removed._dbId) {
              deleteRecordFromSupabase(removed._dbId);
            }
            return;
          }
        }
      }

      // ---------- 输入过滤 ----------
      amountInput.addEventListener("input", function () {
        var val = this.value;
        val = val.replace(/[^0-9.]/g, "");
        var dotIndex = val.indexOf(".");
        if (dotIndex !== -1) {
          val = val.substring(0, dotIndex + 1) + val.substring(dotIndex + 1).replace(/\./g, "");
        }
        if (dotIndex !== -1) {
          var decimalPart = val.substring(dotIndex + 1);
          if (decimalPart.length > 2) {
            val = val.substring(0, dotIndex + 3);
          }
        }
        this.value = val;
      });

      amountInput.addEventListener("paste", function (e) {
        var pastedData = (e.clipboardData || window.clipboardData).getData("text");
        if (pastedData && !/^[\d.]+$/.test(pastedData)) {
          var cleaned = pastedData.replace(/[^0-9.]/g, "");
          var dotIdx = cleaned.indexOf(".");
          var final = cleaned;
          if (dotIdx !== -1) {
            final = cleaned.substring(0, dotIdx + 1) + cleaned.substring(dotIdx + 1).replace(/\./g, "");
          }
          e.preventDefault();
          this.value = final;
          this.dispatchEvent(new Event("input", { bubbles: true }));
        }
      });

      // ---------- 预算弹窗 ----------
      function openBudgetModal() {
        budgetInput.value = budget !== null ? budget : "";
        budgetModal.classList.remove("hidden");
        setTimeout(function () { budgetInput.focus(); }, 100);
      }

      function closeBudgetModal() {
        budgetModal.classList.add("hidden");
      }

      function confirmBudget() {
        var rawValue = budgetInput.value.trim();
        if (rawValue === "") {
          budget = null;
          localStorage.removeItem(BUDGET_KEY);
        } else {
          var num = parseFloat(rawValue);
          if (isNaN(num) || num < 0) return;
          if (num === 0) {
            budget = null;
            localStorage.removeItem(BUDGET_KEY);
          } else {
            budget = num;
            localStorage.setItem(BUDGET_KEY, budget);
          }
        }
        updateBudgetDisplay();
        closeBudgetModal();
      }

      // ---------- 历史弹窗 ----------
      function openHistoryModal() {
        renderHistoryList();
        historyModal.classList.remove("hidden");
      }

      function closeHistoryModal() {
        historyModal.classList.add("hidden");
      }

      // ---------- 删除一条记录 ----------
      async function deleteRecord(originalIndex) {
        if (!confirm("确定删除这条记录吗？")) return;
        var removed = history.splice(originalIndex, 1)[0];
        total -= removed.amount;
        total = parseFloat(total.toFixed(2));
        if (total < 0) total = 0;
        saveToStorage();
        updateDisplay();
        renderHistoryList();
        // 同步删除 Supabase
        if (currentUser && removed._dbId) {
          deleteRecordFromSupabase(removed._dbId);
        }
      }

      // ---------- 开始编辑一条记录 ----------
      function startEdit(originalIndex, itemDiv) {
        var record = history[originalIndex];
        itemDiv.setAttribute("data-editing-index", originalIndex);
        itemDiv.innerHTML = "";

        var editRow = document.createElement("div");
        editRow.className = "history-item-edit-row";

        var amtInput = document.createElement("input");
        amtInput.type = "text";
        amtInput.inputMode = "decimal";
        amtInput.className = "history-edit-input";
        amtInput.value = formatAmount(record.amount);
        amtInput.addEventListener("input", function () {
          var val = this.value.replace(/[^0-9.]/g, "");
          var dotIdx = val.indexOf(".");
          if (dotIdx !== -1) {
            val = val.substring(0, dotIdx + 1) + val.substring(dotIdx + 1).replace(/\./g, "");
            if (val.substring(dotIdx + 1).length > 2) {
              val = val.substring(0, dotIdx + 3);
            }
          }
          this.value = val;
        });

        var ntInput = document.createElement("input");
        ntInput.type = "text";
        ntInput.className = "history-edit-input note-input";
        ntInput.value = record.note;
        ntInput.placeholder = "备注";

        var timeSpan = document.createElement("span");
        timeSpan.className = "history-item-time";
        timeSpan.textContent = record.time;

        var saveBtn = document.createElement("button");
        saveBtn.className = "history-edit-save";
        saveBtn.textContent = "✓";
        saveBtn.title = "保存";
        saveBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          saveEdit(originalIndex, amtInput.value.trim(), ntInput.value.trim());
        });

        var cancelBtn = document.createElement("button");
        cancelBtn.className = "history-edit-cancel";
        cancelBtn.textContent = "✕";
        cancelBtn.title = "取消";
        cancelBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          renderHistoryList();
        });

        editRow.appendChild(amtInput);
        editRow.appendChild(ntInput);
        editRow.appendChild(saveBtn);
        editRow.appendChild(cancelBtn);

        itemDiv.appendChild(editRow);
        itemDiv.appendChild(timeSpan);

        setTimeout(function () { amtInput.focus(); amtInput.select(); }, 50);

        amtInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveEdit(originalIndex, amtInput.value.trim(), ntInput.value.trim()); }
        });
        ntInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); saveEdit(originalIndex, amtInput.value.trim(), ntInput.value.trim()); }
        });
      }

      // ---------- 保存编辑 ----------
      async function saveEdit(originalIndex, newAmountStr, newNoteStr) {
        var newAmount = parseFloat(newAmountStr);
        if (isNaN(newAmount) || newAmount <= 0) return;

        var oldRecord = history[originalIndex];
        var oldAmount = oldRecord.amount;

        history[originalIndex].amount = newAmount;
        history[originalIndex].note = newNoteStr !== "" ? newNoteStr : "未备注";

        total = total - oldAmount + newAmount;
        total = parseFloat(total.toFixed(2));
        if (total < 0) total = 0;

        saveToStorage();
        updateDisplay();
        renderHistoryList();

        // 同步更新 Supabase
        if (currentUser && oldRecord._dbId) {
          updateRecordInSupabase(oldRecord._dbId, {
            amount: history[originalIndex].amount,
            note: history[originalIndex].note,
            date: history[originalIndex].date,
            time: history[originalIndex].time
          });
        }
      }

      // ---------- 渲染历史列表（仅显示今日记录） ----------
      function renderHistoryList() {
        historyList.innerHTML = "";
        var today = getDateString();
        var todayRecords = [];
        var todayIndices = [];
        for (var idx = 0; idx < history.length; idx++) {
          if (history[idx].date === today) {
            todayRecords.push(history[idx]);
            todayIndices.push(idx);
          }
        }
        if (todayRecords.length === 0) {
          var emptyDiv = document.createElement("div");
          emptyDiv.className = "history-empty";
          emptyDiv.textContent = "今日暂无记录";
          historyList.appendChild(emptyDiv);
          return;
        }
        var reversed = todayRecords.slice().reverse();
        var reversedIndices = todayIndices.slice().reverse();
        for (var i = 0; i < reversed.length; i++) {
          var record = reversed[i];
          var originalIndex = reversedIndices[i];

          var itemDiv = document.createElement("div");
          itemDiv.className = "history-item";

          var leftDiv = document.createElement("div");
          leftDiv.className = "history-item-left";

          var amountSpan = document.createElement("span");
          amountSpan.className = "history-item-amount";
          amountSpan.textContent = "+" + formatAmount(record.amount) + "元";

          var noteSpan = document.createElement("span");
          noteSpan.className = "history-item-note";
          noteSpan.textContent = record.note;

          leftDiv.appendChild(amountSpan);
          leftDiv.appendChild(noteSpan);

          var timeSpan = document.createElement("span");
          timeSpan.className = "history-item-time";
          timeSpan.textContent = record.time;

          var actionsDiv = document.createElement("div");
          actionsDiv.className = "history-item-actions";

          var editBtn = document.createElement("button");
          editBtn.className = "history-action-btn";
          editBtn.textContent = "✏️";
          editBtn.title = "编辑";
          editBtn.addEventListener("click", function (idx, div) {
            return function (e) { e.stopPropagation(); startEdit(idx, div); };
          }(originalIndex, itemDiv));

          var delBtn = document.createElement("button");
          delBtn.className = "history-action-btn delete-btn";
          delBtn.textContent = "🗑️";
          delBtn.title = "删除";
          delBtn.addEventListener("click", function (idx) {
            return function (e) { e.stopPropagation(); deleteRecord(idx); };
          }(originalIndex));

          actionsDiv.appendChild(editBtn);
          actionsDiv.appendChild(delBtn);

          itemDiv.appendChild(leftDiv);
          itemDiv.appendChild(actionsDiv);
          itemDiv.appendChild(timeSpan);
          historyList.appendChild(itemDiv);
        }
      }

      // ---------- 按钮事件 ----------
      addBtn.addEventListener("click", addRecord);
      undoBtn.addEventListener("click", openUndoConfirmModal);
      budgetSetBtn.addEventListener("click", openBudgetModal);
      budgetCancelBtn.addEventListener("click", closeBudgetModal);
      budgetConfirmBtn.addEventListener("click", confirmBudget);
      historyBtn.addEventListener("click", openHistoryModal);
      historyCloseBtn.addEventListener("click", closeHistoryModal);

      budgetModal.addEventListener("click", function (e) {
        if (e.target === budgetModal) closeBudgetModal();
      });
      historyModal.addEventListener("click", function (e) {
        if (e.target === historyModal) closeHistoryModal();
      });

      undoConfirmBtn.addEventListener("click", confirmUndo);
      undoCancelBtn.addEventListener("click", closeUndoConfirmModal);
      undoConfirmModal.addEventListener("click", function (e) {
        if (e.target === undoConfirmModal) closeUndoConfirmModal();
      });

      budgetInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); confirmBudget(); }
      });

      amountInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); addRecord(); }
      });
      noteInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); addRecord(); }
      });

      // ---------- 认证按钮事件 ----------
      loginBtn.addEventListener("click", handleLogin);
      registerBtn.addEventListener("click", handleRegister);
      logoutBtn.addEventListener("click", handleLogout);

      // 密码输入框回车登录
      authPassword.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); handleLogin(); }
      });

      // ---------- 页面初始化：先检查登录状态，再决定数据来源 ----------
      checkSession();

      // ---------- 阻止移动端双击缩放 ----------
      displayAreaEl.addEventListener("dblclick", function (e) { e.preventDefault(); }, { passive: false });
    })();
  </script>

</body>
</html>
